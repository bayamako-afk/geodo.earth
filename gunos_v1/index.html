<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GUNOS V1</title>
  <style>
    /* ── Reset ─────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Colors */
      --c-bg:           #0d1117;
      --c-surface:      #161b22;
      --c-surface-2:    #21262d;
      --c-surface-3:    #2d333b;
      --c-border:       #30363d;
      --c-border-soft:  #21262d;
      --c-text:         #c9d1d9;
      --c-text-muted:   #6e7681;
      --c-text-dim:     #484f58;
      --c-accent:       #f0c040;
      --c-accent-dim:   #7a6010;
      --c-city:         #58a6ff;
      --c-city-dim:     #1a3a5c;
      --c-green:        #3fb950;
      --c-red:          #f85149;
      --c-orange:       #d29922;

      /* Layout */
      --header-h:       44px;
      --bottom-h:       200px;
      --panel-gap:      2px;

      /* Typography */
      --font-mono:      'Courier New', Courier, monospace;
      --font-sans:      -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--c-bg);
      color: var(--c-text);
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1.5;
      overflow: hidden;
    }

    /* ── App Shell ─────────────────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ════════════════════════════════════════════════════════════════════════
       HEADER BAR
    ════════════════════════════════════════════════════════════════════════ */
    #app-header {
      display: flex;
      align-items: center;
      height: var(--header-h);
      padding: 0 12px;
      background: var(--c-surface);
      border-bottom: 1px solid var(--c-border);
      flex-shrink: 0;
      gap: 10px;
      z-index: 100;
    }

    /* Brand */
    .hdr-brand {
      display: flex;
      align-items: baseline;
      gap: 6px;
      flex-shrink: 0;
    }

    .hdr-brand__platform {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 700;
      color: var(--c-accent);
      letter-spacing: 0.1em;
      white-space: nowrap;
    }

    .hdr-brand__sep {
      color: var(--c-border);
      font-size: 13px;
    }

    .hdr-brand__city {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 700;
      color: var(--c-city);
      letter-spacing: 0.14em;
      white-space: nowrap;
      min-width: 54px;
    }

    /* City selector */
    #hdr-city-selector {
      display: flex;
      align-items: center;
      gap: 3px;
      flex-shrink: 0;
    }

    .hdr-city-btn {
      background: transparent;
      color: var(--c-text-muted);
      border: 1px solid var(--c-border);
      border-radius: 3px;
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 2px 7px;
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
    }

    .hdr-city-btn:hover {
      background: var(--c-surface-2);
      color: var(--c-text);
      border-color: var(--c-text-muted);
    }

    .hdr-city-btn--active {
      background: var(--c-city-dim);
      color: var(--c-city);
      border-color: var(--c-city);
    }

    /* Spacer */
    .hdr-spacer { flex: 1; }

    /* Action buttons */
    .hdr-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .hdr-action-btn {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 4px 14px;
      border-radius: 4px;
      border: 1px solid;
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
    }

    .hdr-action-btn--start {
      background: var(--c-accent-dim);
      color: var(--c-accent);
      border-color: var(--c-accent);
    }

    .hdr-action-btn--start:hover {
      background: #a07820;
      color: #fff8d0;
    }

    .hdr-action-btn--start.hdr-action-btn--playing {
      background: #1a3020;
      color: var(--c-green);
      border-color: var(--c-green);
      cursor: default;
    }

    .hdr-action-btn--start.hdr-action-btn--disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .hdr-action-btn--reset {
      background: transparent;
      color: var(--c-text-muted);
      border-color: var(--c-border);
    }

    .hdr-action-btn--reset:hover {
      background: var(--c-surface-2);
      color: var(--c-text);
      border-color: var(--c-text-muted);
    }

    /* Status */
    .hdr-status {
      font-family: var(--font-mono);
      font-size: 10px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .hdr-status--idle    { color: var(--c-text-dim); }
    .hdr-status--loading { color: var(--c-orange); }
    .hdr-status--playing { color: var(--c-green); }
    .hdr-status--error   { color: var(--c-red); }

    /* ════════════════════════════════════════════════════════════════════════
       MAIN CONTENT AREA
    ════════════════════════════════════════════════════════════════════════ */
    #app-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      gap: var(--panel-gap);
      background: var(--c-bg);
      min-height: 0;
    }

    /* ── Map area (dominant center) ────────────────────────────────────────── */
    #map-area {
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* ── Bottom split panels ───────────────────────────────────────────────── */
    #bottom-area {
      display: flex;
      height: var(--bottom-h);
      flex-shrink: 0;
      gap: var(--panel-gap);
    }

    /* ════════════════════════════════════════════════════════════════════════
       PANEL BASE
    ════════════════════════════════════════════════════════════════════════ */
    .gs-panel {
      background: var(--c-surface);
      border: 1px solid var(--c-border-soft);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .gs-panel__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 10px;
      background: var(--c-surface-2);
      border-bottom: 1px solid var(--c-border-soft);
      flex-shrink: 0;
    }

    .gs-panel__title {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 700;
      color: var(--c-text-muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .gs-panel__title--city {
      color: var(--c-city);
    }

    .gs-panel__body {
      flex: 1;
      overflow: auto;
      min-height: 0;
    }

    /* ════════════════════════════════════════════════════════════════════════
       MAP PANEL
    ════════════════════════════════════════════════════════════════════════ */
    #panel-map {
      height: 100%;
    }

    #map-panel-body {
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      height: 100%;
    }

    /* City identity */
    .map-city-identity {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .map-city-identity__label {
      font-family: var(--font-mono);
      font-size: 28px;
      font-weight: 700;
      color: var(--c-city);
      letter-spacing: 0.1em;
      line-height: 1;
    }

    .map-city-identity__name {
      font-size: 13px;
      color: var(--c-text-muted);
      letter-spacing: 0.04em;
    }

    /* Featured lines row */
    .map-lines-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .map-line-badge {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 2px 8px;
      border: 1px solid;
      border-radius: 3px;
      background: transparent;
    }

    /* Map grid placeholder */
    .map-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
    }

    .map-placeholder__grid {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow: auto;
      min-height: 0;
    }

    .map-placeholder__note {
      font-size: 10px;
      color: var(--c-text-dim);
      font-family: var(--font-mono);
      flex-shrink: 0;
    }

    /* Line rows */
    .map-line-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .map-line-row__label {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      width: 28px;
      flex-shrink: 0;
      text-align: right;
    }

    .map-line-row__slots {
      display: flex;
      gap: 3px;
      flex: 1;
    }

    .map-slot {
      width: 32px;
      height: 28px;
      border: 1px solid;
      border-radius: 3px;
      flex-shrink: 0;
      transition: background 0.1s;
    }

    .map-slot:hover {
      opacity: 0.7;
    }

    .map-grid-empty {
      font-size: 11px;
      color: var(--c-text-dim);
      font-family: var(--font-mono);
      padding: 16px 0;
    }

    /* Data status badge */
    .map-data-status {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      padding: 2px 8px;
      border-radius: 3px;
      align-self: flex-start;
      flex-shrink: 0;
    }

    .map-data-status--ready {
      background: #0d2a14;
      color: var(--c-green);
      border: 1px solid #1a4a24;
    }

    .map-data-status--pending {
      background: #2a1a00;
      color: var(--c-orange);
      border: 1px solid #4a3000;
    }

    /* ════════════════════════════════════════════════════════════════════════
       HAND PANEL (bottom-left)
    ════════════════════════════════════════════════════════════════════════ */
    #panel-hand {
      flex: 1;
      min-width: 0;
    }

    .hand-panel-inner {
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      height: 100%;
    }

    .hand-cards-row {
      display: flex;
      gap: 5px;
      flex: 1;
      align-items: center;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .hand-card-slot {
      flex-shrink: 0;
      width: 52px;
      height: 72px;
      border: 1px dashed var(--c-border);
      border-radius: 5px;
      background: var(--c-surface-2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hand-card-slot--empty .hand-card-slot__inner {
      width: 20px;
      height: 20px;
      border: 1px dashed var(--c-text-dim);
      border-radius: 3px;
      opacity: 0.4;
    }

    .hand-panel-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .hand-meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .hand-meta-label {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--c-text-dim);
      letter-spacing: 0.1em;
    }

    .hand-meta-value {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      color: var(--c-text-muted);
    }

    .hand-meta-note {
      font-size: 9px;
      color: var(--c-text-dim);
      font-family: var(--font-mono);
      margin-left: auto;
    }

    /* ════════════════════════════════════════════════════════════════════════
       SCORE + LOG PANEL (bottom-right)
    ════════════════════════════════════════════════════════════════════════ */
    #panel-score {
      width: 240px;
      flex-shrink: 0;
    }

    .score-panel-inner {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    .score-section {
      border-bottom: 1px solid var(--c-border-soft);
      flex-shrink: 0;
    }

    .score-section--log {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      border-bottom: none;
    }

    .score-section__title {
      font-family: var(--font-mono);
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: var(--c-text-dim);
      padding: 4px 10px 2px;
    }

    /* Current card */
    .score-current-card {
      padding: 4px 10px 6px;
    }

    .score-current-card__slot {
      width: 44px;
      height: 60px;
      border: 1px dashed var(--c-border);
      border-radius: 4px;
      background: var(--c-surface-2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--c-text-dim);
    }

    /* Score rows */
    .score-rows {
      padding: 4px 10px 6px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .score-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .score-row__label {
      font-size: 10px;
      color: var(--c-text-muted);
    }

    .score-row__value {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      color: var(--c-text);
    }

    .score-row--total .score-row__label {
      color: var(--c-accent);
      font-weight: 700;
    }

    .score-row--total .score-row__value {
      color: var(--c-accent);
      font-size: 14px;
    }

    /* Log */
    .score-log {
      flex: 1;
      overflow-y: auto;
      padding: 4px 10px 6px;
      display: flex;
      flex-direction: column;
      gap: 1px;
      min-height: 0;
    }

    .score-log__entry {
      font-family: var(--font-mono);
      font-size: 10px;
      line-height: 1.4;
      padding: 1px 0;
    }

    .score-log__entry--normal    { color: var(--c-text-muted); }
    .score-log__entry--highlight { color: var(--c-accent); }
    .score-log__entry--muted     { color: var(--c-text-dim); }

    /* ════════════════════════════════════════════════════════════════════════
       BOOT ERROR
    ════════════════════════════════════════════════════════════════════════ */
    #boot-error {
      display: none;
      position: fixed;
      top: 54px;
      left: 50%;
      transform: translateX(-50%);
      background: #2d0f0f;
      color: var(--c-red);
      border: 1px solid var(--c-red);
      border-radius: 5px;
      padding: 10px 20px;
      font-family: var(--font-mono);
      font-size: 11px;
      z-index: 9999;
      max-width: 500px;
      text-align: center;
    }

    /* Notice banner */
    .gs-notice {
      position: fixed;
      top: 52px;
      left: 50%;
      transform: translateX(-50%);
      padding: 7px 18px;
      border-radius: 5px;
      font-size: 10px;
      font-family: var(--font-mono);
      z-index: 9998;
      pointer-events: none;
      white-space: nowrap;
    }

    .gs-notice--warn {
      background: #2a1a00;
      color: var(--c-orange);
      border: 1px solid #5a3a00;
    }

    /* ════════════════════════════════════════════════════════════════════════
       RESPONSIVE
    ════════════════════════════════════════════════════════════════════════ */
    @media (max-width: 680px) {
      #bottom-area {
        flex-direction: column;
        height: auto;
      }

      #panel-score {
        width: 100%;
      }

      .map-city-identity__label {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>

<div id="app">

  <!-- ════════════════════════════════════════════════════════════════════════
       HEADER BAR
  ════════════════════════════════════════════════════════════════════════ -->
  <header id="app-header">

    <!-- Brand + City -->
    <div class="hdr-brand">
      <span class="hdr-brand__platform">GUNOS V1</span>
      <span class="hdr-brand__sep">·</span>
      <span class="hdr-brand__city" id="hdr-city-label">——</span>
    </div>

    <!-- City Selector -->
    <div id="hdr-city-selector">
      <!-- Populated by header_bar.js -->
    </div>

    <div class="hdr-spacer"></div>

    <!-- Action Buttons -->
    <div class="hdr-actions">
      <span class="hdr-status hdr-status--loading" id="hdr-status">Booting...</span>
      <button class="hdr-action-btn hdr-action-btn--reset" id="btn-reset">RESET</button>
      <button class="hdr-action-btn hdr-action-btn--start hdr-action-btn--ready" id="btn-start">START</button>
    </div>

  </header>

  <!-- ════════════════════════════════════════════════════════════════════════
       MAIN BODY
  ════════════════════════════════════════════════════════════════════════ -->
  <div id="app-body">

    <!-- ── Map Area (dominant center) ──────────────────────────────────────── -->
    <div id="map-area">
      <section class="gs-panel" id="panel-map" style="height:100%;">
        <div class="gs-panel__header">
          <span class="gs-panel__title">MAP</span>
          <span class="gs-panel__title gs-panel__title--city" id="hdr-city-name">——</span>
        </div>
        <div class="gs-panel__body" id="map-panel-body">
          <!-- Populated by map_panel.js -->
        </div>
      </section>
    </div>

    <!-- ── Bottom Split Panels ─────────────────────────────────────────────── -->
    <div id="bottom-area">

      <!-- Hand Panel (bottom-left) -->
      <section class="gs-panel" id="panel-hand">
        <div class="gs-panel__header">
          <span class="gs-panel__title">HAND</span>
          <span class="gs-panel__title" style="color:var(--c-text-dim);">Phase 3</span>
        </div>
        <div class="gs-panel__body" id="hand-panel-body">
          <!-- Populated by hand_panel.js -->
        </div>
      </section>

      <!-- Score + Log Panel (bottom-right) -->
      <section class="gs-panel" id="panel-score">
        <div class="gs-panel__header">
          <span class="gs-panel__title">STATUS</span>
          <span class="gs-panel__title" style="color:var(--c-text-dim);">Phase 5</span>
        </div>
        <div class="gs-panel__body" id="score-panel-body">
          <!-- Populated by score_panel.js -->
        </div>
      </section>

    </div>

  </div>

</div>

<!-- Boot error banner -->
<div id="boot-error"></div>

<!-- App entry point -->
<script type="module" src="src/app/main.js"></script>

</body>
</html>
