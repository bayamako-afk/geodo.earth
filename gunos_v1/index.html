<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GUNOS V1</title>
  <style>
    /* ── Reset ─────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Colors */
      --c-bg:           #0d1117;
      --c-surface:      #161b22;
      --c-surface-2:    #21262d;
      --c-surface-3:    #2d333b;
      --c-border:       #30363d;
      --c-border-soft:  #21262d;
      --c-text:         #c9d1d9;
      --c-text-muted:   #6e7681;
      --c-text-dim:     #484f58;
      --c-accent:       #f0c040;
      --c-accent-dim:   #7a6010;
      --c-city:         #58a6ff;
      --c-city-dim:     #1a3a5c;
      --c-green:        #3fb950;
      --c-red:          #f85149;
      --c-orange:       #d29922;
      --c-purple:       #bc8cff;

      /* Layout */
      --header-h:       44px;
      --bottom-h:       200px;
      --panel-gap:      2px;

      /* Typography */
      --font-mono:      'Courier New', Courier, monospace;
      --font-sans:      -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--c-bg);
      color: var(--c-text);
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1.5;
      /* V1.3 HUD layout: no page scroll needed — panels overlay the fullscreen map */
      overflow: hidden;
    }

    /* ── App Shell ───────────────────────────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;            /* full viewport, no scroll */
      overflow: hidden;
      position: relative;        /* V1.3 Task 02: stacking context for absolute header */
    }

    /* ════════════════════════════════════════════════════════════════════════
       HEADER BAR — V1.3 Task 02: floating HUD header
    ════════════════════════════════════════════════════════════════════════ */
    #app-header {
      display: flex;
      align-items: center;
      flex-wrap: wrap;          /* MOBILE FIX: allows row 2 for action buttons */
      min-height: var(--header-h);
      padding: 0 12px;
      /* V1.3 Task 02: semi-transparent HUD header */
      background: rgba(22, 27, 34, 0.82);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(48, 54, 61, 0.6);
      flex-shrink: 0;
      gap: 6px;
      position: absolute;       /* float over the map */
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;             /* above HUD layer (z-index:10) and map (z-index:1) */
    }

    /* Brand */
    .hdr-brand {
      display: flex;
      align-items: baseline;
      gap: 6px;
      flex-shrink: 0;
    }

    .hdr-brand__platform {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 700;
      color: var(--c-accent);
      letter-spacing: 0.1em;
      white-space: nowrap;
    }

    .hdr-brand__sep {
      color: var(--c-border);
      font-size: 13px;
    }

    .hdr-brand__city {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 700;
      color: var(--c-city);
      letter-spacing: 0.14em;
      white-space: nowrap;
      min-width: 54px;
    }

    /* City selector */
    #hdr-city-selector {
      display: flex;
      align-items: center;
      gap: 3px;
      flex-shrink: 0;
    }

    .hdr-city-btn {
      background: transparent;
      color: var(--c-text-muted);
      border: 1px solid var(--c-border);
      border-radius: 3px;
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 2px 7px;
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
    }

    .hdr-city-btn:hover {
      background: var(--c-surface-2);
      color: var(--c-text);
      border-color: var(--c-text-muted);
    }

    .hdr-city-btn--active {
      background: var(--c-city-dim);
      color: var(--c-city);
      border-color: var(--c-city);
    }

    /* Spacer */
    .hdr-spacer { flex: 1; order: 5; }

    /* Game badge and turn counter: after spacer, before actions */
    #hdr-game-badge { order: 6; }
    #hdr-turn-counter { order: 7; }

    /* Action buttons */
    .hdr-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      order: 8;  /* After spacer/badge/counter; wraps to row 2 on narrow screens */
    }

    .hdr-action-btn {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 4px 14px;
      border-radius: 4px;
      border: 1px solid;
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
    }

    .hdr-action-btn--start {
      background: var(--c-accent-dim);
      color: var(--c-accent);
      border-color: var(--c-accent);
    }

    .hdr-action-btn--start:hover {
      background: #a07820;
      color: #fff8d0;
    }

    .hdr-action-btn--start.hdr-action-btn--playing {
      background: #1a3020;
      color: var(--c-green);
      border-color: var(--c-green);
      cursor: default;
    }

    .hdr-action-btn--start.hdr-action-btn--disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .hdr-action-btn--reset {
      background: transparent;
      color: var(--c-text-muted);
      border-color: var(--c-border);
    }

    .hdr-action-btn--reset:hover {
      background: var(--c-surface-2);
      color: var(--c-text);
      border-color: var(--c-text-muted);
    }

    /* Status */
    .hdr-status {
      font-family: var(--font-mono);
      font-size: 10px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .hdr-status--idle    { color: var(--c-text-dim); }
    .hdr-status--loading { color: var(--c-orange); }
    .hdr-status--playing { color: var(--c-green); }
    .hdr-status--error   { color: var(--c-red); }

    /* ════════════════════════════════════════════════════════════════════════
       V1.3 TASK 02 — FULLSCREEN MAP + FLOATING HUD PANELS
       DOM structure:
         #app (position:relative)
           #app-header (position:absolute, top:0)  ← floating HUD header
           #app-body   (position:absolute, inset:0) ← full viewport
             #map-area  (position:absolute, inset:0)  ← fullscreen map base
             #hud-layer (position:absolute, inset:0, pointer-events:none)
               #bottom-area (position:absolute, bottom:0, pointer-events:auto)
    ════════════════════════════════════════════════════════════════════════ */
    #app-body {
      position: absolute;    /* V1.3 Task 02: full viewport, header floats above */
      inset: 0;
      overflow: hidden;
      background: var(--c-bg);
    }

    /* ── Map area: fullscreen base layer ──────────────────────────────────── */
    #map-area {
      position: absolute;
      inset: 0;              /* covers entire #app-body */
      overflow: hidden;
      z-index: 1;
    }

    /* ── HUD overlay layer ────────────────────────────────────────────────── */
    #hud-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;  /* transparent to map touch/mouse events */
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: flex-end; /* panels anchor to bottom */
    }

    /* ── Bottom split panels (inside HUD layer) — V1.3 Task 02: floating dock ── */
    #bottom-area {
      display: flex;
      flex-direction: row;
      height: var(--bottom-h);
      flex-shrink: 0;
      gap: 6px;
      padding: 0 6px 6px;    /* edge gap so panels float above the map edge */
      pointer-events: auto;  /* re-enable interaction for panels */
    }

    #panel-hand  { flex: 1; min-width: 0; pointer-events: auto; }
    #panel-score { flex: 1; min-width: 0; pointer-events: auto; flex-shrink: 1; }

    /* ════════════════════════════════════════════════════════════════════════
       PANEL BASE — V1.3 Task 02: semi-transparent HUD glass panels
    ════════════════════════════════════════════════════════════════════════ */
    .gs-panel {
      background: rgba(22, 27, 34, 0.80);   /* semi-transparent dark surface */
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(48, 54, 61, 0.55);
      border-radius: 6px;                   /* rounded corners for floating feel */
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .gs-panel__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 10px;
      background: rgba(33, 38, 45, 0.70);   /* slightly darker header tint */
      border-bottom: 1px solid rgba(48, 54, 61, 0.45);
      flex-shrink: 0;
      border-radius: 6px 6px 0 0;           /* match panel corner radius */
    }

    .gs-panel__title {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 700;
      color: var(--c-text-muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .gs-panel__title--city {
      color: var(--c-city);
    }

    .gs-panel__body {
      flex: 1;
      overflow: auto;
      min-height: 0;
    }

    /* ════════════════════════════════════════════════════════════════════════
       MAP PANEL — V1.3 Task 02: fullscreen, no panel chrome
    ════════════════════════════════════════════════════════════════════════ */
    #panel-map {
      height: 100%;
      background: transparent !important;  /* map fills the space, no panel bg needed */
      border: none !important;             /* no border on the fullscreen map panel */
      border-radius: 0 !important;
    }

    /* Hide the legacy gs-panel__header inside #panel-map (redundant in HUD layout) */
    #panel-map > .gs-panel__header {
      display: none;
    }

    #map-panel-body {
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      height: 100%;
    }

    /* City identity */
    .map-city-identity {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .map-city-identity__label {
      font-family: var(--font-mono);
      font-size: 28px;
      font-weight: 700;
      color: var(--c-city);
      letter-spacing: 0.1em;
      line-height: 1;
    }

    .map-city-identity__name {
      font-size: 13px;
      color: var(--c-text-muted);
      letter-spacing: 0.04em;
    }

    /* Featured lines row */
    .map-lines-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .map-line-badge {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 2px 8px;
      border: 1px solid;
      border-radius: 3px;
      background: transparent;
    }

    /* ── Phase 3: Game indicator ─────────────────────────────────────────── */
    .map-game-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      flex-shrink: 0;
    }

    .map-game-indicator__text {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      color: var(--c-text-dim);
    }

    .map-game-indicator--running .map-game-indicator__text  { color: var(--c-green); }
    .map-game-indicator--loading .map-game-indicator__text  { color: var(--c-orange); }
    .map-game-indicator--finished .map-game-indicator__text { color: var(--c-accent); }
    .map-game-indicator--error .map-game-indicator__text    { color: var(--c-red); }

    /* Map grid placeholder */
    .map-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
    }

    .map-placeholder__grid {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow: auto;
      min-height: 0;
    }

    .map-placeholder__note {
      font-size: 10px;
      color: var(--c-text-dim);
      font-family: var(--font-mono);
      flex-shrink: 0;
    }

    /* Line rows */
    .map-line-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .map-line-row__label {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      width: 28px;
      flex-shrink: 0;
      text-align: right;
    }

    .map-line-row__slots {
      display: flex;
      gap: 3px;
      flex: 1;
    }

    .map-slot {
      width: 32px;
      height: 28px;
      border: 1px solid;
      border-radius: 3px;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .map-slot:hover { opacity: 0.7; }

    /* Phase 3: active slot highlight */
    .map-slot--active {
      box-shadow: 0 0 0 2px var(--c-accent);
      background: rgba(240, 192, 64, 0.2) !important;
    }

    .map-grid-empty {
      font-size: 11px;
      color: var(--c-text-dim);
      font-family: var(--font-mono);
      padding: 16px 0;
    }

    /* Data status badge */
    .map-data-status {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      padding: 2px 8px;
      border-radius: 3px;
      align-self: flex-start;
      flex-shrink: 0;
    }

    .map-data-status--ready {
      background: #0d2a14;
      color: var(--c-green);
      border: 1px solid #1a4a24;
    }

    .map-data-status--pending {
      background: #2a1a00;
      color: var(--c-orange);
      border: 1px solid #4a3000;
    }

    /* ════════════════════════════════════════════════════════════════════════
       HAND PANEL (bottom-left)
    ════════════════════════════════════════════════════════════════════════ */
    #panel-hand {
      flex: 1;
      min-width: 0;
    }

    .hand-panel-inner {
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      height: 100%;
    }

    .hand-cards-row {
      display: flex;
      gap: 5px;
      flex: 1;
      align-items: center;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    /* Phase 2: empty slot */
    .hand-card-slot {
      flex-shrink: 0;
      width: 52px;
      height: 72px;
      border: 1px dashed var(--c-border);
      border-radius: 5px;
      background: var(--c-surface-2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hand-card-slot--empty .hand-card-slot__inner {
      width: 20px;
      height: 20px;
      border: 1px dashed var(--c-text-dim);
      border-radius: 3px;
      opacity: 0.4;
    }

    /* Phase 3: filled card slot */
    .hand-card-slot--filled {
      border-style: solid;
      border-color: var(--c-border);
      background: var(--c-surface-3);
      flex-direction: column;
      padding: 4px;
      cursor: default;
      align-items: flex-start;
      justify-content: flex-start;
    }

    .hand-card-slot--filled .hand-card-slot__inner {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      gap: 2px;
    }

    .hand-card__name {
      font-family: var(--font-mono);
      font-size: 8px;
      color: var(--c-text);
      line-height: 1.3;
      word-break: break-all;
      flex: 1;
    }

    .hand-card__meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .hand-card__rarity {
      font-family: var(--font-mono);
      font-size: 8px;
      font-weight: 700;
      padding: 1px 3px;
      border-radius: 2px;
    }

    .hand-card__score {
      font-family: var(--font-mono);
      font-size: 8px;
      color: var(--c-text-muted);
    }

    /* Rarity colors */
    .hand-card--legendary { border-color: #f0c040 !important; }
    .hand-card--legendary .hand-card__rarity { background: #3a2a00; color: #f0c040; }
    .hand-card--epic      { border-color: #bc8cff !important; }
    .hand-card--epic      .hand-card__rarity { background: #2a1a3a; color: #bc8cff; }
    .hand-card--rare      { border-color: #58a6ff !important; }
    .hand-card--rare      .hand-card__rarity { background: #0d2040; color: #58a6ff; }
    .hand-card--common    { border-color: var(--c-border) !important; }
    .hand-card--common    .hand-card__rarity { background: var(--c-surface-2); color: var(--c-text-muted); }

    .hand-empty-msg {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--c-text-dim);
      padding: 8px 4px;
    }

    /* Meta row */
    .hand-panel-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .hand-meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .hand-meta-label {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--c-text-dim);
      letter-spacing: 0.1em;
    }

    .hand-meta-value {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      color: var(--c-text-muted);
    }

    /* Phase 3: Turn controls */
    .hand-turn-controls {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .turn-btn {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 3px 10px;
      border-radius: 3px;
      border: 1px solid;
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
    }

    .turn-btn--play1 {
      background: #0d2a14;
      color: var(--c-green);
      border-color: var(--c-green);
    }

    .turn-btn--play1:hover {
      background: #1a4a24;
    }

    .turn-btn--auto {
      background: #1a1a2a;
      color: var(--c-city);
      border-color: var(--c-city);
    }

    .turn-btn--auto:hover {
      background: #1a3a5c;
    }

    .turn-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    /* ════════════════════════════════════════════════════════════════════════
       SCORE + LOG PANEL (bottom-right)
    ════════════════════════════════════════════════════════════════════════ */
    #panel-score {
      width: 240px;
      flex-shrink: 0;
    }

    .score-panel-inner {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    .score-section {
      border-bottom: 1px solid var(--c-border-soft);
      flex-shrink: 0;
    }

    .score-section--log {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      border-bottom: none;
    }

    .score-section__title {
      font-family: var(--font-mono);
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: var(--c-text-dim);
      padding: 4px 10px 2px;
    }

    /* Phase 3: current card */
    .score-current-card {
      padding: 4px 10px 6px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .score-current-card__name {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      color: var(--c-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .score-current-card__meta {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .score-card-rarity {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 700;
      padding: 1px 4px;
      border-radius: 2px;
    }

    .score-card-rarity--legendary { background: #3a2a00; color: #f0c040; }
    .score-card-rarity--epic      { background: #2a1a3a; color: #bc8cff; }
    .score-card-rarity--rare      { background: #0d2040; color: #58a6ff; }
    .score-card-rarity--common    { background: var(--c-surface-2); color: var(--c-text-muted); }

    .score-card-score {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--c-text-muted);
    }

    /* Phase 3: status rows */
    .score-status-rows {
      padding: 4px 10px 6px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .score-status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .score-status-label {
      font-size: 10px;
      color: var(--c-text-muted);
    }

    .score-status-value {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      color: var(--c-text);
    }

    .score-status-value--idle     { color: var(--c-text-dim); }
    .score-status-value--loading  { color: var(--c-orange); }
    .score-status-value--running  { color: var(--c-green); }
    .score-status-value--finished { color: var(--c-accent); }
    .score-status-value--error    { color: var(--c-red); }

    /* Score rows */
    .score-rows {
      padding: 4px 10px 6px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .score-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .score-row__label {
      font-size: 10px;
      color: var(--c-text-muted);
    }

    .score-row__value {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      color: var(--c-text);
    }

    .score-row--total .score-row__label {
      color: var(--c-accent);
      font-weight: 700;
    }

    .score-row--total .score-row__value {
      color: var(--c-accent);
      font-size: 14px;
    }

    /* Log */
    .score-log {
      flex: 1;
      overflow-y: auto;
      padding: 4px 10px 6px;
      display: flex;
      flex-direction: column;
      gap: 1px;
      min-height: 0;
    }

    .score-log__entry {
      font-family: var(--font-mono);
      font-size: 10px;
      line-height: 1.4;
      padding: 1px 0;
    }

    .score-log__entry--normal    { color: var(--c-text-muted); }
    .score-log__entry--highlight { color: var(--c-accent); }
    .score-log__entry--muted     { color: var(--c-text-dim); }
    .score-log__entry--warn      { color: var(--c-orange); }

    /* ════════════════════════════════════════════════════════════════════════
       BOOT ERROR
    ════════════════════════════════════════════════════════════════════════ */
    #boot-error {
      display: none;
      position: fixed;
      top: 54px;
      left: 50%;
      transform: translateX(-50%);
      background: #2d0f0f;
      color: var(--c-red);
      border: 1px solid var(--c-red);
      border-radius: 5px;
      padding: 10px 20px;
      font-family: var(--font-mono);
      font-size: 11px;
      z-index: 9999;
      max-width: 500px;
      text-align: center;
    }

    /* Notice banner */
    .gs-notice {
      position: fixed;
      top: 52px;
      left: 50%;
      transform: translateX(-50%);
      padding: 7px 18px;
      border-radius: 5px;
      font-size: 10px;
      font-family: var(--font-mono);
      z-index: 9998;
      pointer-events: none;
      white-space: nowrap;
    }

    .gs-notice--warn {
      background: #2a1a00;
      color: var(--c-orange);
      border: 1px solid #5a3a00;
    }

    /* ════════════════════════════════════════════════════════════════════════
       PHASE 4: MAP CANVAS (SVG)
    ════════════════════════════════════════════════════════════════════════ */

    /* Map panel body: remove old padding, let SVG fill */
    #map-panel-body {
      padding: 0 !important;
      gap: 0 !important;
    }

    /* Header row inside map panel — V1.3 Task 02: transparent (map shows through) */
    .map-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 12px;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(48, 54, 61, 0.4);
      background: rgba(33, 38, 45, 0.65);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .map-header__left {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-shrink: 0;
    }

    .map-city-label {
      font-family: var(--font-mono);
      font-size: 18px;
      font-weight: 700;
      color: var(--c-city);
      letter-spacing: 0.1em;
      line-height: 1;
    }

    .map-city-name {
      font-size: 11px;
      color: var(--c-text-muted);
    }

    .map-header__lines {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      flex: 1;
    }

    .map-header__right {
      flex-shrink: 0;
      margin-left: auto;
    }

    /* Game indicator in header */
    .map-game-indicator {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 2px 8px;
      border-radius: 3px;
      border: 1px solid var(--c-border);
      color: var(--c-text-dim);
      background: var(--c-surface-3);
    }

    .map-game-indicator--running  { color: var(--c-green);  border-color: var(--c-green);  background: #0d2a14; }
    .map-game-indicator--loading  { color: var(--c-orange); border-color: var(--c-orange); background: #2a1a00; }
    .map-game-indicator--finished { color: var(--c-accent); border-color: var(--c-accent); background: #2a1a00; }
    .map-game-indicator--error    { color: var(--c-red);    border-color: var(--c-red);    background: #2d0f0f; }

    /* SVG canvas wrapper */
    .map-canvas-wrap {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      position: relative;
      background: var(--c-bg);
    }

    .map-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Data status badge (bottom-left of map) */
    .map-data-status {
      position: absolute;
      bottom: 6px;
      left: 10px;
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      padding: 2px 8px;
      border-radius: 3px;
      pointer-events: none;
    }

    .map-data-status--ready   { background: #0d2a14; color: var(--c-green);  border: 1px solid #1a4a24; }
    .map-data-status--pending { background: #2a1a00; color: var(--c-orange); border: 1px solid #4a3000; }

    /* No-graph fallback */
    .map-no-graph {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--c-text-dim);
    }

    /* SVG node pulse animation */
    @keyframes map-pulse {
      0%   { r: 15; opacity: 0.6; }
      50%  { r: 22; opacity: 0.2; }
      100% { r: 15; opacity: 0.6; }
    }

    .map-node-pulse {
      animation: map-pulse 1.2s ease-in-out infinite;
    }

    /* SVG text labels */
    .map-node-label {
      pointer-events: none;
      font-family: var(--font-sans);
    }

    /* V1.1 Task 04: hidden labels — revealed on parent node hover */
    .map-node {
      pointer-events: all;
      cursor: default;
    }
    .map-node-label--hidden {
      opacity: 0 !important;
      transition: opacity 0.15s ease;
      pointer-events: none;
    }
    .map-node:hover .map-node-label--hidden {
      opacity: 0.85 !important;
    }

    .map-legend-label {
      font-family: var(--font-mono);
    }

    /* ════════════════════════════════════════════════════════════════════════
       RESPONSIVE
    ════════════════════════════════════════════════════════════════════════ */
    /* ════════════════════════════════════════════════════════════════════════
       PHASE 5 — LIVE SCORE PANEL
    ════════════════════════════════════════════════════════════════════════ */

    /* Live score area placeholder */
    .score-placeholder {
      color: var(--c-text-dim);
      font-size: 11px;
      padding: 4px 0;
    }

    /* Per-player score block */
    .score-player-block {
      border: 1px solid var(--c-border);
      border-radius: 4px;
      padding: 6px 8px;
      margin-bottom: 6px;
      background: var(--c-surface-2);
    }

    .score-player-block--winner {
      border-color: var(--c-accent);
    }

    .score-player-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }

    .score-player-id {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 0.05em;
    }

    .score-player-id--p1 { color: #4fc3f7; }
    .score-player-id--p2 { color: #ef9a9a; }
    .score-player-id--pn { color: var(--c-text-muted); }

    .score-player-total {
      margin-left: auto;
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: bold;
      color: var(--c-text);
    }

    .score-breakdown-rows {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .score-breakdown-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 11px;
    }

    .score-breakdown-label {
      color: var(--c-text-muted);
    }

    .score-breakdown-value {
      font-family: var(--font-mono);
      color: var(--c-text);
    }

    .score-breakdown-value--bonus {
      color: var(--c-green);
    }

    .score-breakdown-value--route {
      color: var(--c-city);
      font-size: 10px;
      text-align: right;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .score-breakdown-row--route {
      margin-top: 2px;
      padding-top: 2px;
      border-top: 1px solid var(--c-border-soft);
    }

    /* ════════════════════════════════════════════════════════════════════════
       PHASE 5 — RESULT PANEL
    ════════════════════════════════════════════════════════════════════════ */

    .result-panel {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow-y: auto;
      padding: 8px;
      gap: 8px;
    }

    /* Header */
    .result-header {
      text-align: center;
      border-bottom: 1px solid var(--c-border);
      padding-bottom: 6px;
    }

    .result-header__title {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: bold;
      color: var(--c-accent);
      letter-spacing: 0.1em;
    }

    .result-header__sub {
      font-size: 11px;
      color: var(--c-text-muted);
      margin-top: 2px;
    }

    /* Winner announcement */
    .result-winner-announce {
      display: flex;
      align-items: baseline;
      gap: 8px;
      background: var(--c-surface-2);
      border: 1px solid var(--c-accent-dim);
      border-radius: 4px;
      padding: 8px 10px;
    }

    .result-winner-announce__label {
      font-size: 11px;
      color: var(--c-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .result-winner-announce__name {
      font-family: var(--font-mono);
      font-size: 16px;
      font-weight: bold;
    }

    .result-winner-announce__score {
      margin-left: auto;
      font-family: var(--font-mono);
      font-size: 14px;
      color: var(--c-accent);
    }

    /* Per-player result block */
    .result-player-block {
      border: 1px solid var(--c-border);
      border-radius: 4px;
      padding: 7px 9px;
      background: var(--c-surface-2);
    }

    .result-player-block--winner {
      border-color: var(--c-accent-dim);
      background: #1c1a0a;
    }

    .result-player-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 5px;
    }

    .result-rank {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--c-text-dim);
      width: 18px;
    }

    .result-player-id {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: bold;
    }

    .result-winner-badge {
      font-size: 9px;
      font-family: var(--font-mono);
      background: var(--c-accent);
      color: #000;
      padding: 1px 5px;
      border-radius: 2px;
      letter-spacing: 0.06em;
    }

    .result-total-score {
      margin-left: auto;
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: bold;
      color: var(--c-text);
    }

    .result-breakdown {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .result-breakdown-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 11px;
    }

    .result-breakdown-row--divider {
      margin-top: 3px;
      padding-top: 3px;
      border-top: 1px solid var(--c-border-soft);
    }

    .result-breakdown-label {
      color: var(--c-text-muted);
    }

    .result-breakdown-value {
      font-family: var(--font-mono);
      color: var(--c-text);
    }

    .result-breakdown-value--bonus {
      color: var(--c-green);
    }

    .result-breakdown-value--route {
      color: var(--c-city);
      font-size: 10px;
      text-align: right;
      max-width: 130px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .result-breakdown-value--hub {
      color: var(--c-purple);
      font-size: 10px;
    }

    .result-breakdown-value--station {
      color: var(--c-orange);
      font-size: 10px;
      text-align: right;
      max-width: 130px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .result-why-label {
      margin-top: 4px;
      font-size: 10px;
      color: var(--c-accent);
      font-style: italic;
    }

    /* Footer */
    .result-footer {
      text-align: center;
      font-size: 10px;
      color: var(--c-text-dim);
      padding: 4px 0;
      border-top: 1px solid var(--c-border-soft);
      margin-top: auto;
    }

    /* ════════════════════════════════════════════════════════════════════════
       PHASE 6: RUNTIME CLARITY & CROSS-CITY POLISH
    ════════════════════════════════════════════════════════════════════════ */

    /* Header game badge */
    .hdr-game-badge {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      padding: 2px 8px;
      border-radius: 3px;
      border: 1px solid var(--c-border);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .hdr-game-badge--idle     { color: var(--c-text-dim);  border-color: var(--c-border); }
    .hdr-game-badge--loading  { color: var(--c-orange);    border-color: var(--c-orange); background: rgba(210,153,34,0.08); }
    .hdr-game-badge--running  { color: var(--c-green);     border-color: var(--c-green);  background: rgba(63,185,80,0.08); }
    .hdr-game-badge--finished { color: var(--c-accent);    border-color: var(--c-accent); background: rgba(240,192,64,0.1); }
    .hdr-game-badge--error    { color: var(--c-red);       border-color: var(--c-red);    background: rgba(248,81,73,0.08); }

    /* Header turn counter */
    #hdr-turn-counter {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--c-text-muted);
      flex-shrink: 0;
    }

    /* City button with station count */
    .hdr-city-btn__label { display: block; }
    .hdr-city-btn__count {
      display: block;
      font-size: 8px;
      color: var(--c-text-dim);
      letter-spacing: 0;
      font-weight: 400;
      margin-top: 1px;
    }
    .hdr-city-btn--active .hdr-city-btn__count { color: var(--c-city); opacity: 0.7; }

    /* Map header (Phase 6 redesign) — V1.3 Task 02: transparent overlay */
    .map-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 12px;
      background: rgba(33, 38, 45, 0.65);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(48, 54, 61, 0.4);
      flex-shrink: 0;
    }

    .map-header__identity {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }

    .map-city-label {
      font-family: var(--font-mono);
      font-size: 16px;
      font-weight: 700;
      color: var(--c-city);
      letter-spacing: 0.1em;
      flex-shrink: 0;
    }

    .map-city-name {
      font-size: 11px;
      color: var(--c-text-muted);
      flex-shrink: 0;
    }

    .map-city-descriptor {
      font-size: 10px;
      color: var(--c-text-dim);
      font-style: italic;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .map-city-summary {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--c-text-dim);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .map-header__lines {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .map-header__right {
      flex-shrink: 0;
    }

    /* Map game indicator (Phase 6 — inline text, not icon) */
    .map-game-indicator {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      color: var(--c-text-dim);
      padding: 2px 6px;
      border: 1px solid var(--c-border);
      border-radius: 3px;
      white-space: nowrap;
    }

    .map-game-indicator--running  { color: var(--c-green);  border-color: var(--c-green);  background: rgba(63,185,80,0.06); }
    .map-game-indicator--loading  { color: var(--c-orange); border-color: var(--c-orange); }
    .map-game-indicator--finished { color: var(--c-accent); border-color: var(--c-accent); background: rgba(240,192,64,0.08); }
    .map-game-indicator--error    { color: var(--c-red);    border-color: var(--c-red); }

    /* Map canvas wrap */
    .map-canvas-wrap {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      display: flex;
      align-items: stretch;
    }

    .map-svg {
      width: 100%;
      height: 100%;
    }

    .map-data-status {
      font-family: var(--font-mono);
      font-size: 8px;
      letter-spacing: 0.1em;
      padding: 2px 8px;
      flex-shrink: 0;
    }

    .map-data-status--ready   { color: var(--c-green); }
    .map-data-status--pending { color: var(--c-text-dim); }

    .map-no-graph {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--c-text-dim);
      font-size: 11px;
      width: 100%;
      height: 100%;
    }

    /* Score panel Phase 6: compact status inline */
    .score-status-inline {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 8px;
    }

    .score-status-chip {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid var(--c-border);
      color: var(--c-text-dim);
    }

    .score-status-chip--idle     { color: var(--c-text-dim); border-color: var(--c-border); }
    .score-status-chip--loading  { color: var(--c-orange);   border-color: var(--c-orange); }
    .score-status-chip--running  { color: var(--c-green);    border-color: var(--c-green);  background: rgba(63,185,80,0.08); }
    .score-status-chip--finished { color: var(--c-accent);   border-color: var(--c-accent); }
    .score-status-chip--error    { color: var(--c-red);      border-color: var(--c-red); }

    .score-status-item {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 11px;
    }

    .score-status-item .score-status-label {
      color: var(--c-text-dim);
      font-size: 9px;
    }

    /* Score player block Phase 6: lead indicator */
    .score-player-block--lead {
      border-left: 2px solid var(--c-accent) !important;
      background: rgba(240,192,64,0.04);
    }

    .score-lead-badge {
      font-family: var(--font-mono);
      font-size: 8px;
      font-weight: 700;
      color: var(--c-accent);
      letter-spacing: 0.08em;
      flex: 1;
    }

    /* Score bar visualization */
    .score-breakdown-compact {
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding: 0 6px 6px;
    }

    .score-breakdown-bar-row {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
    }

    .score-bar-wrap {
      flex: 1;
      height: 4px;
      background: var(--c-surface-3);
      border-radius: 2px;
      overflow: hidden;
    }

    .score-bar {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .score-bar--station { background: var(--c-city); }

    /* Result panel Phase 6: winner prominence */
    .result-winner-announce {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 8px 12px;
      background: rgba(240,192,64,0.06);
      border-bottom: 1px solid var(--c-border-soft);
    }

    .result-winner-announce__label {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: var(--c-text-muted);
    }

    .result-winner-announce__name {
      font-family: var(--font-mono);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.1em;
      line-height: 1;
    }

    .result-winner-announce__score {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 700;
    }

    .result-winner-announce__draw {
      font-family: var(--font-mono);
      font-size: 20px;
      font-weight: 700;
      color: var(--c-text-muted);
      letter-spacing: 0.14em;
    }

    /* Result breakdown grid (Phase 6: 2-column) */
    .result-breakdown-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 2px 8px;
      font-size: 11px;
      padding: 4px 0;
    }

    .result-breakdown-grid .result-breakdown-label {
      color: var(--c-text-muted);
      white-space: nowrap;
    }

    .result-breakdown-grid .result-breakdown-value {
      font-family: var(--font-mono);
      text-align: right;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    @media (max-width: 680px) {
      #bottom-area {
        flex-direction: column;
        height: auto;
        padding: 0 4px 4px;   /* tighter edge gap on mobile */
      }

      #panel-score {
        width: 100%;
      }

      .map-city-identity__label {
        font-size: 20px;
      }
    }

    /* ── Task 05: Responsive score / result panel polish ──────────────────── */

    /* Narrow screens: tighten score panel */
    @media (max-width: 480px) {
      .score-player-block {
        padding: 4px 6px;
        margin-bottom: 4px;
      }

      .score-player-total {
        font-size: 11px;
      }

      .score-breakdown-compact {
        gap: 2px;
        padding: 0 4px 4px;
      }

      .score-breakdown-bar-row {
        font-size: 10px;
      }

      .score-route-progress {
        grid-template-columns: 44px 1fr 24px;
        gap: 3px;
      }

      .score-route-name {
        font-size: 8px;
      }

      .score-route-pct {
        font-size: 8px;
      }

      .score-hub-names {
        gap: 2px;
        margin-left: 4px;
      }

      .score-hub-name {
        font-size: 8px;
        max-width: 80px;
        padding: 1px 3px;
      }

      /* Result panel narrow */
      .result-breakdown-value--route,
      .result-breakdown-value--station {
        max-width: 55%;
        font-size: 9px;
      }

      .result-winner-announce__name {
        font-size: 16px;
      }

      .result-winner-announce__score {
        font-size: 11px;
      }
    }

    /* ── Task 05: City Comparison Mini-panel ─────────────────────────────── */
    .city-compare-panel {
      border-top: 1px solid var(--c-border-soft);
      padding: 6px 10px;
      flex-shrink: 0;
    }

    .city-compare-panel__title {
      font-family: var(--font-mono);
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: var(--c-text-dim);
      margin-bottom: 5px;
    }

    .city-compare-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
    }

    .city-compare-cell {
      background: var(--c-surface-2);
      border: 1px solid var(--c-border);
      border-radius: 3px;
      padding: 4px 5px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .city-compare-cell--active {
      border-color: var(--c-city);
      background: rgba(88,166,255,0.06);
    }

    .city-compare-cell__name {
      font-family: var(--font-mono);
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--c-city);
    }

    .city-compare-cell--active .city-compare-cell__name {
      color: var(--c-city);
    }

    .city-compare-cell__stat {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--c-text);
      white-space: nowrap;
    }

    .city-compare-cell__stat--muted {
      font-size: 8px;
      color: var(--c-text-dim);
    }

    .city-compare-cell__trait {
      font-size: 8px;
      color: var(--c-text-dim);
      font-style: italic;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Narrow: stack comparison cells 2x2 */
    @media (max-width: 480px) {
      .city-compare-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    /* ── Task 02: Route progress bars ─────────────────────────────────────── */
    .score-route-progress {
      display: grid;
      grid-template-columns: 52px 1fr 28px;
      align-items: center;
      gap: 4px;
      padding: 2px 0;
      margin-left: 8px;
    }

    .score-route-name {
      font-size: 9px;
      color: var(--c-text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .score-route-name--complete {
      color: #a5d6a7;
      font-weight: 600;
    }

    .score-route-name--partial {
      color: #fff59d;
    }

    .score-route-bar-wrap {
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      height: 4px;
      overflow: hidden;
    }

    .score-route-bar {
      height: 100%;
      border-radius: 2px;
      background: rgba(255,255,255,0.25);
      transition: width 0.3s ease;
    }

    .score-route-bar--complete {
      background: #a5d6a7;
    }

    .score-route-bar--partial {
      background: #fff59d;
    }

    .score-route-bar--progress {
      background: rgba(255,255,255,0.3);
    }

    .score-route-pct {
      font-size: 9px;
      color: var(--c-text-muted);
      text-align: right;
      font-family: var(--font-mono);
    }

    /* ════════════════════════════════════════════════════════════════════════
       V1.2 TASK 01 — MOBILE-FIRST INTERACTION POLISH
    ════════════════════════════════════════════════════════════════════════ */

    /* Ensure all interactive controls meet 44px minimum touch target (iOS HIG) */
    .hdr-action-btn {
      min-height: 36px;
      padding: 6px 14px;
    }

    .hdr-city-btn {
      min-height: 32px;
      padding: 4px 8px;
    }

    .turn-btn {
      min-height: 36px;
      padding: 6px 12px;
    }

    /* Active/pressed state for touch feedback */
    .hdr-action-btn:active,
    .hdr-city-btn:active,
    .turn-btn:active {
      opacity: 0.75;
      transform: scale(0.97);
    }

    /* Map canvas: prevent default touch scroll/zoom conflicts */
    .map-canvas-wrap {
      touch-action: none;
    }

    /* Bottom area: allow taller on mobile to reduce scroll */
    @media (max-width: 680px) {
      /* ── V1.3 TASK 01: HUD LAYOUT — no scroll needed, panels overlay the map ──
         The map fills the full #app-body (position:absolute, inset:0).
         The HUD layer sits on top (pointer-events:none) with panels at the
         bottom (pointer-events:auto).  No page scroll required.
      ──────────────────────────────────────────────────────────────────────────── */

      /* Bottom panels: side-by-side on mobile too (map is full height) */
      #bottom-area {
        flex-direction: row;
        height: var(--bottom-h);
      }

      /* Larger touch targets on mobile */
      .hdr-action-btn {
        min-height: 44px;
        padding: 10px 18px;
        font-size: 11px;
      }

      .hdr-city-btn {
        min-height: 36px;
        padding: 6px 10px;
        font-size: 10px;
      }

      .turn-btn {
        min-height: 44px;
        padding: 10px 16px;
        font-size: 10px;
      }

      /* Header: reduce gap to fit more buttons */
      #app-header {
        gap: 6px;
        padding: 0 8px;
      }

      #hdr-city-selector {
        gap: 4px;
      }

      .hdr-actions {
        gap: 6px;
      }

      /* Turn controls: larger gap */
      #hdr-turn-controls {
        gap: 8px !important;
      }

      /* Hand cards: larger touch targets */
      .hand-card-slot {
        width: 60px;
        height: 84px;
      }

      .hand-cards-row {
        gap: 8px;
        padding-bottom: 4px;
      }
    }

    /* Extra narrow: 390px (iPhone SE / standard) */
    @media (max-width: 430px) {
      .hdr-brand__platform {
        font-size: 12px;
      }

      .hdr-brand__city {
        display: none;
      }

      .hdr-brand__sep {
        display: none;
      }

      /* Hide station count in city buttons to save space */
      .hdr-city-btn__count {
        display: none;
      }

      /* Compact header status text */
      #hdr-status {
        display: none;
      }

      /* Map header: hide descriptor on very narrow */
      .map-city-descriptor {
        display: none;
      }

      .map-city-summary {
        display: none;
      }
    }

    /* ════════════════════════════════════════════════════════════════════════
       V1.2 TASK 06 FIX — MOBILE START BUTTON ALWAYS TAPPABLE
       Root cause: at ≤480px, hdr-city-selector (5 cities, flex-shrink:0)
       pushes hdr-actions (HELP/RESET/START) off-screen to the right.
       Fix: wrap header into two rows so action buttons are always visible.
    ════════════════════════════════════════════════════════════════════════ */
    @media (max-width: 480px) {
      /* Allow header to wrap into two rows */
      #app-header {
        flex-wrap: wrap;
        height: auto;
        min-height: var(--header-h);
        padding: 4px 8px;
        gap: 4px;
        align-items: center;
      }

      /* Row 1: brand + city selector (take full width) */
      .hdr-brand {
        flex-shrink: 0;
      }

      #hdr-city-selector {
        flex: 1;
        flex-wrap: wrap;
        gap: 3px;
        overflow: hidden;
      }

      /* Spacer collapses on mobile — row break happens naturally */
      .hdr-spacer {
        display: none;
      }

      /* Row 2: game badge + action buttons — pushed to own row */
      #hdr-game-badge {
        order: 10;
        margin-left: auto;
      }

      #hdr-turn-counter {
        order: 11;
      }

      .hdr-actions {
        order: 12;
        width: 100%;
        justify-content: flex-end;
        padding-bottom: 4px;
      }

      /* Compact action buttons on mobile */
      .hdr-action-btn {
        min-height: 40px;
        padding: 8px 14px;
        font-size: 10px;
      }

      /* Compact city buttons to fit 5 in a row */
      .hdr-city-btn {
        padding: 4px 7px;
        font-size: 9px;
        min-height: 30px;
      }
    }

    /* ── Task 02: Hub station names ────────────────────────────────────────── */
    .score-hub-names {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      margin-left: 8px;
      margin-bottom: 2px;
    }

    .score-hub-name {
      font-size: 9px;
      color: #ffcc80;
      background: rgba(255,204,128,0.12);
      border-radius: 3px;
      padding: 1px 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100px;
    }

    /* ════════════════════════════════════════════════════════════════════════
       V1.2 Task 03: HELP MODAL
    ════════════════════════════════════════════════════════════════════════ */
    #help-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 9000;
      align-items: center;
      justify-content: center;
    }
    #help-modal-overlay.help-modal--open {
      display: flex;
    }
    #help-modal {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: 10px;
      width: min(420px, 92vw);
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    #help-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px 10px;
      border-bottom: 1px solid var(--c-border);
      flex-shrink: 0;
    }
    #help-modal-title {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--c-accent);
    }
    #help-modal-close {
      background: none;
      border: none;
      color: var(--c-text-muted);
      cursor: pointer;
      font-size: 14px;
      padding: 2px 6px;
      border-radius: 4px;
      line-height: 1;
    }
    #help-modal-close:hover { color: var(--c-text); background: var(--c-surface-2); }
    #help-modal-body {
      flex: 1;
      padding: 20px 20px 16px;
      overflow-y: auto;
      text-align: center;
    }
    #help-step-icon {
      font-size: 36px;
      margin-bottom: 10px;
      line-height: 1;
    }
    #help-step-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--c-text);
      margin-bottom: 10px;
    }
    #help-step-body {
      font-size: 12px;
      color: var(--c-text-muted);
      line-height: 1.7;
      text-align: left;
    }
    #help-step-body strong { color: var(--c-text); }
    #help-modal-footer {
      padding: 10px 16px 14px;
      border-top: 1px solid var(--c-border);
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
    }
    #help-step-dots {
      display: flex;
      gap: 6px;
    }
    .help-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--c-border);
      transition: background 0.2s;
    }
    .help-dot--active { background: var(--c-accent); }
    #help-modal-nav {
      display: flex;
      gap: 8px;
    }
    #help-modal-nav button {
      background: var(--c-surface-2);
      border: 1px solid var(--c-border);
      color: var(--c-text);
      border-radius: 6px;
      padding: 6px 16px;
      font-size: 11px;
      cursor: pointer;
      min-height: 32px;
    }
    #help-modal-nav button:hover { background: var(--c-surface-3); }
    #help-btn-done {
      background: var(--c-accent-dim) !important;
      border-color: var(--c-accent) !important;
      color: var(--c-accent) !important;
    }
    #help-btn-done:hover { opacity: 0.85; }

    /* HELP button in header */
    #btn-help {
      background: none;
      border: 1px solid var(--c-border);
      color: var(--c-text-muted);
      border-radius: 5px;
      padding: 4px 8px;
      font-size: 11px;
      cursor: pointer;
      min-height: 28px;
      font-family: var(--font-mono);
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }
    #btn-help:hover { color: var(--c-text); border-color: var(--c-text-muted); }

    /* ── Info icon tooltip (score panel) ───────────────────────────────────── */
    .score-info-icon {
      display: inline-block;
      width: 13px;
      height: 13px;
      line-height: 13px;
      text-align: center;
      font-size: 9px;
      border-radius: 50%;
      border: 1px solid var(--c-border);
      color: var(--c-text-muted);
      cursor: help;
      margin-left: 3px;
      position: relative;
      vertical-align: middle;
      flex-shrink: 0;
    }
    .score-info-icon:hover { border-color: var(--c-text-muted); color: var(--c-text); }
    .score-info-icon .score-info-tooltip {
      display: none;
      position: absolute;
      left: 50%;
      bottom: calc(100% + 6px);
      transform: translateX(-50%);
      background: var(--c-surface-3);
      border: 1px solid var(--c-border);
      border-radius: 6px;
      padding: 6px 9px;
      font-size: 10px;
      color: var(--c-text);
      white-space: nowrap;
      z-index: 500;
      pointer-events: none;
      line-height: 1.5;
      min-width: 180px;
      max-width: 220px;
      white-space: normal;
      text-align: left;
    }
    .score-info-icon:hover .score-info-tooltip { display: block; }

    /* ── Result panel score explanation ────────────────────────────────────── */
    .result-score-explain {
      font-size: 9px;
      color: var(--c-text-dim);
      grid-column: 1 / -1;
      margin-bottom: 3px;
      padding: 3px 6px;
      background: rgba(255,255,255,0.03);
      border-radius: 4px;
      line-height: 1.4;
    }
    .result-score-explain strong { color: var(--c-text-muted); }

    /* ════════════════════════════════════════════════════════════════════════
       V1.2 Task 04 — RESULT DRAMA & FEEDBACK ENHANCEMENT
    ════════════════════════════════════════════════════════════════════════ */

    /* GAME OVER flash animation on #app */
    @keyframes game-over-flash {
      0%   { box-shadow: inset 0 0 0 0 transparent; }
      25%  { box-shadow: inset 0 0 0 3px rgba(240,192,64,0.45); }
      60%  { box-shadow: inset 0 0 0 3px rgba(240,192,64,0.25); }
      100% { box-shadow: inset 0 0 0 0 transparent; }
    }
    #app.game-over-flash {
      animation: game-over-flash 1.2s ease-out forwards;
    }

    /* Score comparison bar (P1 vs P2) */
    .result-score-bar-wrap {
      display: flex;
      height: 6px;
      border-radius: 3px;
      overflow: hidden;
      background: var(--c-surface-3);
      margin: 6px 0 4px;
      gap: 1px;
    }
    .result-score-bar-p1 {
      background: #4fc3f7;
      border-radius: 3px 0 0 3px;
      transition: width 0.6s ease;
    }
    .result-score-bar-p2 {
      background: #ef9a9a;
      border-radius: 0 3px 3px 0;
      flex: 1;
      transition: width 0.6s ease;
    }
    .result-score-bar-labels {
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      font-family: var(--font-mono);
      color: var(--c-text-muted);
      margin-bottom: 6px;
    }
    .result-score-bar-labels span:first-child { color: #4fc3f7; }
    .result-score-bar-labels span:last-child  { color: #ef9a9a; }

    /* Match verdict chip */
    .result-verdict {
      display: inline-block;
      font-size: 9px;
      font-family: var(--font-mono);
      letter-spacing: 0.08em;
      padding: 2px 7px;
      border-radius: 3px;
      margin-left: 6px;
      vertical-align: middle;
      flex-shrink: 0;
    }
    .result-verdict--close    { background: rgba(63,185,80,0.12); color: #3fb950; border: 1px solid rgba(63,185,80,0.3); }
    .result-verdict--dominant { background: rgba(240,192,64,0.12); color: var(--c-accent); border: 1px solid var(--c-accent-dim); }
    .result-verdict--draw     { background: rgba(110,118,129,0.12); color: var(--c-text-muted); border: 1px solid var(--c-border); }

    /* Score gap in winner announce */
    .result-score-gap {
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--c-text-muted);
      margin-left: 4px;
    }

    /* Why won — enhanced multi-line */
    .result-why-block {
      margin-top: 5px;
      padding: 5px 7px;
      background: rgba(240,192,64,0.06);
      border-left: 2px solid var(--c-accent-dim);
      border-radius: 0 4px 4px 0;
    }
    .result-why-line {
      font-size: 9px;
      color: var(--c-text-muted);
      line-height: 1.5;
    }
    .result-why-line strong { color: var(--c-accent); }

    /* Rematch button */
    .result-rematch-btn {
      display: block;
      width: 100%;
      margin-top: 6px;
      padding: 8px;
      background: var(--c-surface-2);
      border: 1px solid var(--c-border);
      border-radius: 5px;
      color: var(--c-text-muted);
      font-size: 11px;
      font-family: var(--font-mono);
      letter-spacing: 0.06em;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .result-rematch-btn:hover {
      background: var(--c-surface-3);
      border-color: var(--c-accent-dim);
      color: var(--c-accent);
    }
    .result-rematch-btn:active { opacity: 0.8; transform: scale(0.98); }

    /* Map: winner highlight — dim loser nodes */
    .map-node--loser circle { opacity: 0.35; }
    .map-node--loser text   { opacity: 0.25; }

    /* ════════════════════════════════════════════════════════════════════════
       V1.3 TASK 03 — MOBILE PORTRAIT LAYOUT OPTIMIZATION
       Target: max-width 680px (smartphone portrait)
       Goal: maximize map visibility while keeping hand + status operable
    ════════════════════════════════════════════════════════════════════════ */

    @media (max-width: 680px) {
      /* Shrink bottom HUD height: 200px → 150px to expose more map */
      :root {
        --bottom-h: 150px;
      }

      /* Compact hand panel inner padding */
      .hand-panel-inner {
        padding: 5px 8px;
        gap: 4px;
      }

      /* Smaller hand cards on mobile portrait */
      .hand-card-slot {
        width: 48px;
        height: 64px;
      }

      /* Tighter card row gap */
      .hand-cards-row {
        gap: 5px;
        padding-bottom: 2px;
      }

      /* Compact hand meta row */
      .hand-panel-meta {
        gap: 6px;
        font-size: 10px;
      }

      /* Status panel: limit height so it doesn't dominate */
      #panel-score {
        max-height: 150px;
        overflow: hidden;
      }

      /* Hide log section on mobile portrait — keep score/status only */
      .score-section--log {
        display: none;
      }

      /* Hide city compare panel on mobile portrait */
      .city-compare-panel {
        display: none;
      }

      /* Compact score section padding */
      .score-section {
        padding: 4px 8px;
      }

      /* Compact score player block */
      .score-player-block {
        padding: 3px 6px;
        margin-bottom: 2px;
      }
    }

    /* ════════════════════════════════════════════════════════════════════════
       V1.3 TASK 04 — SMARTPHONE LANDSCAPE LAYOUT OPTIMIZATION
       Target: max-height 500px + orientation landscape (smartphone held sideways)
       Goal: maximize map vertical space while keeping HUD operable
    ════════════════════════════════════════════════════════════════════════ */

    @media (max-height: 500px) and (orientation: landscape) {
      /* Shrink layout variables for landscape thin mode */
      :root {
        --header-h: 36px;
        --bottom-h: 110px;
      }

      /* Header: ultra-compact for landscape */
      #app-header {
        padding: 1px 8px;
        gap: 4px;
        min-height: var(--header-h);
        /* Prevent 2-row wrapping in landscape — keep single row */
        flex-wrap: nowrap;
        overflow: hidden;
      }

      /* Brand: smaller in landscape */
      .hdr-brand__platform {
        font-size: 11px;
      }

      /* Hide city label in header (shown on map) */
      .hdr-brand__city,
      .hdr-brand__sep {
        display: none;
      }

      /* City selector: compact */
      #hdr-city-selector {
        gap: 2px;
        flex-shrink: 1;
        overflow: hidden;
      }

      /* City buttons: minimal */
      .hdr-city-btn {
        padding: 2px 5px;
        font-size: 9px;
        min-height: 26px;
      }

      /* Hide station count in city buttons */
      .hdr-city-btn__count {
        display: none;
      }

      /* Action buttons: compact */
      .hdr-action-btn {
        min-height: 30px;
        padding: 4px 8px;
        font-size: 10px;
      }

      /* Hide status text in header */
      #hdr-status {
        display: none;
      }

      /* Game badge: smaller */
      .hdr-game-badge {
        font-size: 9px;
        padding: 1px 5px;
      }

      /* Turn counter: smaller */
      #hdr-turn-counter {
        font-size: 9px;
      }

      /* HELP button: hide in landscape to save space */
      #btn-help {
        display: none;
      }

      /* Hand panel: ultra-thin for landscape */
      .hand-panel-inner {
        padding: 3px 6px;
        gap: 3px;
      }

      /* Hand cards: smallest size for landscape */
      .hand-card-slot {
        width: 42px;
        height: 56px;
      }

      /* Card row: tightest gap */
      .hand-cards-row {
        gap: 4px;
        padding-bottom: 1px;
      }

      /* Hand meta row: minimal */
      .hand-panel-meta {
        gap: 4px;
        font-size: 9px;
      }

      /* Panel header: compact */
      .gs-panel__header {
        padding: 3px 8px;
        min-height: 22px;
      }

      /* Status panel: ultra-compact */
      #panel-score {
        max-height: 110px;
        overflow: hidden;
      }

      /* Hide log section in landscape */
      .score-section--log {
        display: none;
      }

      /* Hide city compare in landscape */
      .city-compare-panel {
        display: none;
      }

      /* Score section: minimal padding */
      .score-section {
        padding: 3px 6px;
      }

      /* Score player block: minimal */
      .score-player-block {
        padding: 2px 5px;
        margin-bottom: 1px;
      }

      /* Hub names: hide in landscape */
      .score-hub-names {
        display: none;
      }

      /* Bottom area: ensure thin mode */
      #bottom-area {
        padding: 0 4px 4px;
      }
    }

    /* Extra narrow: 430px — tighter header to free more vertical space */
    @media (max-width: 430px) {
      /* Header 2-row layout: reduce padding further */
      #app-header {
        padding: 2px 6px;
        gap: 3px;
      }

      /* Reduce action button height on very narrow */
      .hdr-action-btn {
        min-height: 36px;
        padding: 6px 10px;
        font-size: 10px;
      }

      /* Compact city buttons */
      .hdr-city-btn {
        padding: 3px 6px;
        font-size: 9px;
        min-height: 28px;
      }

      /* Even smaller hand cards on very narrow */
      .hand-card-slot {
        width: 44px;
        height: 60px;
      }
    }

    /* ── V1.3 Task 05: Map Overlay Info Panel ──────────────────────────────── */

    /* Overlay container — sits inside #hud-layer, above the map, below bottom-area */
    #map-overlay-info {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: var(--bottom-h);
      pointer-events: none;          /* map interaction unaffected */
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* ── Situation panel (top-left) ─────────────────────────────────────── */
    #map-overlay-situation {
      position: absolute;
      top: 8px;
      left: 8px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .moi-panel {
      background: rgba(13, 17, 23, 0.72);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(48, 54, 61, 0.7);
      border-radius: 5px;
      padding: 5px 8px;
      min-width: 80px;
    }

    .moi-situation-row {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      line-height: 1.4;
    }

    .moi-label {
      color: var(--c-text-muted);
      font-size: 9px;
      letter-spacing: 0.05em;
      min-width: 30px;
    }

    .moi-value {
      color: var(--c-text);
      font-weight: 600;
      font-size: 10px;
    }

    .moi-value--dim {
      color: var(--c-text-dim);
      font-weight: 400;
    }

    .moi-value--p1 {
      color: #58a6ff;
    }

    .moi-value--p2 {
      color: #f78166;
    }

    .moi-sep {
      color: var(--c-text-dim);
      font-size: 9px;
    }

    /* Mode chip */
    .moi-chip {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 1px 5px;
      border-radius: 3px;
      background: rgba(48, 54, 61, 0.8);
      color: var(--c-text-muted);
    }

    .moi-chip--running {
      background: rgba(63, 185, 80, 0.2);
      color: var(--c-green);
      border: 1px solid rgba(63, 185, 80, 0.4);
    }

    .moi-chip--finished {
      background: rgba(240, 192, 64, 0.2);
      color: var(--c-accent);
      border: 1px solid rgba(240, 192, 64, 0.4);
    }

    .moi-chip--loading {
      background: rgba(88, 166, 255, 0.15);
      color: var(--c-city);
    }

    .moi-chip--idle {
      background: rgba(48, 54, 61, 0.6);
      color: var(--c-text-muted);
    }

    /* Leader value colors */
    .moi-value--leader.moi-value--p1 { color: #58a6ff; }
    .moi-value--leader.moi-value--p2 { color: #f78166; }

    /* ── Score summary panel (top-right) ────────────────────────────────── */
    #map-overlay-scores {
      position: absolute;
      top: 8px;
      right: 8px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .moi-panel--scores {
      min-width: 64px;
    }

    .moi-score-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 10px;
      line-height: 1.5;
      padding: 1px 0;
      border-radius: 3px;
      transition: background 0.2s;
    }

    .moi-score-row--lead {
      background: rgba(240, 192, 64, 0.08);
    }

    .moi-score-id {
      font-weight: 700;
      font-size: 9px;
      letter-spacing: 0.06em;
    }

    .moi-score-id--p1 { color: #58a6ff; }
    .moi-score-id--p2 { color: #f78166; }

    .moi-score-val {
      color: var(--c-text);
      font-weight: 600;
      font-size: 11px;
      min-width: 24px;
      text-align: right;
    }

    /* ── Toast (bottom-center) ──────────────────────────────────────────── */
    #map-overlay-toast {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(13, 17, 23, 0.82);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(48, 54, 61, 0.8);
      border-radius: 20px;
      padding: 4px 14px 4px 10px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--c-text);
      white-space: nowrap;
      max-width: 80vw;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: opacity 0.4s ease;
      opacity: 1;
      pointer-events: none;
    }

    #map-overlay-toast.moi-toast--hidden {
      opacity: 0;
    }

    .moi-toast-icon {
      font-size: 10px;
      flex-shrink: 0;
    }

    .moi-toast-text {
      font-size: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Toast type colors */
    .moi-toast--bonus  { border-color: rgba(240, 192, 64, 0.6); }
    .moi-toast--bonus .moi-toast-icon { color: var(--c-accent); }
    .moi-toast--hub    { border-color: rgba(188, 140, 255, 0.6); }
    .moi-toast--hub .moi-toast-icon   { color: var(--c-purple); }
    .moi-toast--route  { border-color: rgba(63, 185, 80, 0.6); }
    .moi-toast--route .moi-toast-icon { color: var(--c-green); }
    .moi-toast--win    { border-color: rgba(240, 192, 64, 0.8); }
    .moi-toast--win .moi-toast-icon   { color: var(--c-accent); }

    /* ── Responsive: landscape (max-height 500px) ───────────────────────── */
    @media (max-height: 500px) and (orientation: landscape) {
      #map-overlay-situation {
        top: 4px;
        left: 4px;
      }

      #map-overlay-scores {
        top: 4px;
        right: 4px;
      }

      .moi-panel {
        padding: 3px 6px;
      }

      .moi-situation-row,
      .moi-score-row {
        font-size: 9px;
        gap: 3px;
      }

      .moi-label { font-size: 8px; }
      .moi-value { font-size: 9px; }
      .moi-chip  { font-size: 8px; padding: 1px 4px; }
      .moi-score-val { font-size: 10px; }

      /* Hide leader row on landscape to save space */
      #moi-leader-row { display: none !important; }

      #map-overlay-toast {
        font-size: 10px;
        padding: 3px 10px 3px 8px;
        bottom: 4px;
      }
    }

    /* ── Responsive: portrait mobile (max-width 680px) ─────────────────── */
    @media (max-width: 680px) {
      .moi-panel {
        padding: 4px 6px;
      }

      .moi-situation-row,
      .moi-score-row {
        font-size: 9px;
      }

      .moi-label { font-size: 8px; min-width: 24px; }
      .moi-value { font-size: 9px; }
      .moi-chip  { font-size: 8px; }

      /* Hide leader on portrait mobile */
      #moi-leader-row { display: none !important; }

      #map-overlay-toast {
        font-size: 10px;
        padding: 3px 10px 3px 8px;
      }
    }

    /* ── V1.4 Task 01: Station Value Hint Panel ──────────────────────────────── */

    #station-hint-panel {
      position: absolute;
      left: 6px;
      bottom: calc(var(--bottom-h) + 8px);
      max-width: 220px;
      background: rgba(10, 14, 20, 0.78);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 6px;
      padding: 6px 10px 7px;
      pointer-events: none;
      z-index: 30;
      opacity: 0;
    }

    #station-hint-panel.sh-panel--hidden {
      opacity: 0;
      transform: translateY(6px);
      pointer-events: none;
    }

    #station-hint-panel.sh-panel--visible {
      opacity: 1;
      transform: translateY(0);
    }

    #station-hint-panel.sh-panel--fading {
      opacity: 0;
      transform: translateY(4px);
    }

    .sh-station-name {
      font-size: 11px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.92);
      letter-spacing: 0.02em;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    .sh-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      margin-bottom: 4px;
    }

    .sh-tag {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 1px 5px 2px;
      border-radius: 3px;
      text-transform: uppercase;
    }

    .sh-tag--hub-top  { background: rgba(255, 200, 50, 0.85);  color: #1a1000; }
    .sh-tag--hub-major { background: rgba(255, 170, 30, 0.80); color: #1a1000; }
    .sh-tag--hub      { background: rgba(220, 150, 20, 0.70);  color: #1a1000; }
    .sh-tag--route    { background: rgba(60, 180, 120, 0.85);  color: #001a0a; }
    .sh-tag--capture  { background: rgba(80, 200, 255, 0.90);  color: #001020; }
    .sh-tag--chain    { background: rgba(40, 160, 220, 0.80);  color: #001020; }
    .sh-tag--lead     { background: rgba(200, 80, 255, 0.80);  color: #100020; }
    .sh-tag--score    { background: rgba(100, 200, 100, 0.75); color: #001a00; }
    .sh-tag--value    { background: rgba(120, 130, 150, 0.65);  color: rgba(255,255,255,0.85); }

    .sh-reason {
      font-size: 9px;
      color: rgba(255, 255, 255, 0.55);
      letter-spacing: 0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    /* Landscape: compact station hint */
    @media (max-height: 500px) and (orientation: landscape) {
      #station-hint-panel {
        bottom: calc(var(--bottom-h) + 4px);
        max-width: 180px;
        padding: 4px 8px 5px;
      }
      .sh-station-name { font-size: 10px; margin-bottom: 3px; }
      .sh-tag           { font-size: 8px; padding: 1px 4px; }
      .sh-reason        { display: none; }
    }

    /* Mobile portrait: even more compact */
    @media (max-width: 680px) {
      #station-hint-panel {
        bottom: calc(var(--bottom-h) + 4px);
        max-width: 160px;
        padding: 4px 8px 5px;
      }
      .sh-station-name { font-size: 10px; }
      .sh-reason        { display: none; }
    }

    /* ── V1.4 Task 02: Next Candidate Indicators Panel ────────────────────────── */

    #candidate-panel {
      position: absolute;
      left: 6px;
      bottom: calc(var(--bottom-h) + 72px);  /* above station-hint-panel */
      max-width: 220px;
      background: rgba(10, 14, 20, 0.72);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 6px;
      padding: 5px 9px 6px;
      pointer-events: none;
      z-index: 29;   /* just below station-hint-panel (z-index:30) */
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    #candidate-panel.ci-panel--hidden {
      opacity: 0;
      transform: translateY(6px);
    }

    #candidate-panel.ci-panel--visible {
      opacity: 1;
      transform: translateY(0);
    }

    .ci-header {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: rgba(255, 255, 255, 0.35);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .ci-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .ci-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding-bottom: 4px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .ci-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .ci-name {
      font-size: 10px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.88);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    .ci-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
    }

    .ci-tag {
      display: inline-block;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 1px 4px 1px;
      border-radius: 3px;
      text-transform: uppercase;
    }

    /* Tag color variants — match station_hint.js palette */
    .ci-tag--hub-top   { background: rgba(255, 200, 50, 0.80);  color: #1a1000; }
    .ci-tag--hub-major { background: rgba(255, 170, 30, 0.75);  color: #1a1000; }
    .ci-tag--hub       { background: rgba(220, 150, 20, 0.65);  color: #1a1000; }
    .ci-tag--route     { background: rgba(60, 180, 120, 0.80);  color: #001a0a; }
    .ci-tag--chain     { background: rgba(40, 160, 220, 0.75);  color: #001020; }
    .ci-tag--connect   { background: rgba(60, 140, 200, 0.65);  color: #001020; }
    .ci-tag--lead      { background: rgba(200, 80, 255, 0.75);  color: #100020; }
    .ci-tag--score     { background: rgba(100, 200, 100, 0.70); color: #001a00; }
    .ci-tag--value     { background: rgba(120, 130, 150, 0.55); color: rgba(255,255,255,0.80); }

    .ci-reason {
      font-size: 8px;
      color: rgba(255, 255, 255, 0.42);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    /* Landscape: compact candidate panel */
    @media (max-height: 500px) and (orientation: landscape) {
      #candidate-panel {
        bottom: calc(var(--bottom-h) + 56px);
        max-width: 170px;
        padding: 3px 7px 4px;
      }
      .ci-header    { font-size: 7px; margin-bottom: 3px; }
      .ci-name      { font-size: 9px; }
      .ci-tag       { font-size: 7px; padding: 1px 3px; }
      .ci-reason    { display: none; }
      /* Show max 2 candidates in landscape */
      .ci-item:nth-child(n+3) { display: none; }
    }

    /* Mobile portrait: compact */
    @media (max-width: 680px) {
      #candidate-panel {
        bottom: calc(var(--bottom-h) + 60px);
        max-width: 160px;
        padding: 3px 7px 4px;
      }
      .ci-header  { font-size: 7px; margin-bottom: 2px; }
      .ci-name    { font-size: 9px; }
      .ci-reason  { display: none; }
      /* Show max 2 candidates on portrait */
      .ci-item:nth-child(n+3) { display: none; }
    }


    /* ── V1.4 Task 03: Hub / Route+ Meaning Badges ─────────────────────────────── */

    /* ─ Shared badge visual upgrades for Hub★ / Hub+ / Route+ ─ */

    /* Hub★ — gold border + glow to signal top-tier hub */
    .sh-tag--hub-top,
    .ci-tag--hub-top {
      background: rgba(255, 210, 60, 0.92);
      color: #1a0e00;
      border: 1px solid rgba(255, 230, 100, 0.80);
      box-shadow: 0 0 5px rgba(255, 200, 50, 0.45);
      font-size: 9px;
    }

    /* Hub+ — amber border to distinguish from plain Hub */
    .sh-tag--hub-major,
    .ci-tag--hub-major {
      background: rgba(255, 175, 35, 0.85);
