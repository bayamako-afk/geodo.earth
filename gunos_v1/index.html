<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GUNOS V1</title>
  <style>
    /* ── Reset ─────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Colors */
      --c-bg:           #0d1117;
      --c-surface:      #161b22;
      --c-surface-2:    #21262d;
      --c-surface-3:    #2d333b;
      --c-border:       #30363d;
      --c-border-soft:  #21262d;
      --c-text:         #c9d1d9;
      --c-text-muted:   #6e7681;
      --c-text-dim:     #484f58;
      --c-accent:       #f0c040;
      --c-accent-dim:   #7a6010;
      --c-city:         #58a6ff;
      --c-city-dim:     #1a3a5c;
      --c-green:        #3fb950;
      --c-red:          #f85149;
      --c-orange:       #d29922;
      --c-purple:       #bc8cff;

      /* Layout */
      --header-h:       44px;
      --bottom-h:       200px;
      --panel-gap:      2px;

      /* Typography */
      --font-mono:      'Courier New', Courier, monospace;
      --font-sans:      -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--c-bg);
      color: var(--c-text);
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1.5;
      overflow: hidden;
    }

    /* ── App Shell ─────────────────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ════════════════════════════════════════════════════════════════════════
       HEADER BAR
    ════════════════════════════════════════════════════════════════════════ */
    #app-header {
      display: flex;
      align-items: center;
      height: var(--header-h);
      padding: 0 12px;
      background: var(--c-surface);
      border-bottom: 1px solid var(--c-border);
      flex-shrink: 0;
      gap: 10px;
      z-index: 100;
    }

    /* Brand */
    .hdr-brand {
      display: flex;
      align-items: baseline;
      gap: 6px;
      flex-shrink: 0;
    }

    .hdr-brand__platform {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 700;
      color: var(--c-accent);
      letter-spacing: 0.1em;
      white-space: nowrap;
    }

    .hdr-brand__sep {
      color: var(--c-border);
      font-size: 13px;
    }

    .hdr-brand__city {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 700;
      color: var(--c-city);
      letter-spacing: 0.14em;
      white-space: nowrap;
      min-width: 54px;
    }

    /* City selector */
    #hdr-city-selector {
      display: flex;
      align-items: center;
      gap: 3px;
      flex-shrink: 0;
    }

    .hdr-city-btn {
      background: transparent;
      color: var(--c-text-muted);
      border: 1px solid var(--c-border);
      border-radius: 3px;
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 2px 7px;
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
    }

    .hdr-city-btn:hover {
      background: var(--c-surface-2);
      color: var(--c-text);
      border-color: var(--c-text-muted);
    }

    .hdr-city-btn--active {
      background: var(--c-city-dim);
      color: var(--c-city);
      border-color: var(--c-city);
    }

    /* Spacer */
    .hdr-spacer { flex: 1; }

    /* Action buttons */
    .hdr-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .hdr-action-btn {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 4px 14px;
      border-radius: 4px;
      border: 1px solid;
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
    }

    .hdr-action-btn--start {
      background: var(--c-accent-dim);
      color: var(--c-accent);
      border-color: var(--c-accent);
    }

    .hdr-action-btn--start:hover {
      background: #a07820;
      color: #fff8d0;
    }

    .hdr-action-btn--start.hdr-action-btn--playing {
      background: #1a3020;
      color: var(--c-green);
      border-color: var(--c-green);
      cursor: default;
    }

    .hdr-action-btn--start.hdr-action-btn--disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .hdr-action-btn--reset {
      background: transparent;
      color: var(--c-text-muted);
      border-color: var(--c-border);
    }

    .hdr-action-btn--reset:hover {
      background: var(--c-surface-2);
      color: var(--c-text);
      border-color: var(--c-text-muted);
    }

    /* Status */
    .hdr-status {
      font-family: var(--font-mono);
      font-size: 10px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .hdr-status--idle    { color: var(--c-text-dim); }
    .hdr-status--loading { color: var(--c-orange); }
    .hdr-status--playing { color: var(--c-green); }
    .hdr-status--error   { color: var(--c-red); }

    /* ════════════════════════════════════════════════════════════════════════
       MAIN CONTENT AREA
    ════════════════════════════════════════════════════════════════════════ */
    #app-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      gap: var(--panel-gap);
      background: var(--c-bg);
      min-height: 0;
    }

    /* ── Map area (dominant center) ────────────────────────────────────────── */
    #map-area {
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* ── Bottom split panels ───────────────────────────────────────────────── */
    #bottom-area {
      display: flex;
      height: var(--bottom-h);
      flex-shrink: 0;
      gap: var(--panel-gap);
    }

    /* ════════════════════════════════════════════════════════════════════════
       PANEL BASE
    ════════════════════════════════════════════════════════════════════════ */
    .gs-panel {
      background: var(--c-surface);
      border: 1px solid var(--c-border-soft);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .gs-panel__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 10px;
      background: var(--c-surface-2);
      border-bottom: 1px solid var(--c-border-soft);
      flex-shrink: 0;
    }

    .gs-panel__title {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 700;
      color: var(--c-text-muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .gs-panel__title--city {
      color: var(--c-city);
    }

    .gs-panel__body {
      flex: 1;
      overflow: auto;
      min-height: 0;
    }

    /* ════════════════════════════════════════════════════════════════════════
       MAP PANEL
    ════════════════════════════════════════════════════════════════════════ */
    #panel-map {
      height: 100%;
    }

    #map-panel-body {
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      height: 100%;
    }

    /* City identity */
    .map-city-identity {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .map-city-identity__label {
      font-family: var(--font-mono);
      font-size: 28px;
      font-weight: 700;
      color: var(--c-city);
      letter-spacing: 0.1em;
      line-height: 1;
    }

    .map-city-identity__name {
      font-size: 13px;
      color: var(--c-text-muted);
      letter-spacing: 0.04em;
    }

    /* Featured lines row */
    .map-lines-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .map-line-badge {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 2px 8px;
      border: 1px solid;
      border-radius: 3px;
      background: transparent;
    }

    /* ── Phase 3: Game indicator ─────────────────────────────────────────── */
    .map-game-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      flex-shrink: 0;
    }

    .map-game-indicator__text {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      color: var(--c-text-dim);
    }

    .map-game-indicator--running .map-game-indicator__text  { color: var(--c-green); }
    .map-game-indicator--loading .map-game-indicator__text  { color: var(--c-orange); }
    .map-game-indicator--finished .map-game-indicator__text { color: var(--c-accent); }
    .map-game-indicator--error .map-game-indicator__text    { color: var(--c-red); }

    /* Map grid placeholder */
    .map-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
    }

    .map-placeholder__grid {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow: auto;
      min-height: 0;
    }

    .map-placeholder__note {
      font-size: 10px;
      color: var(--c-text-dim);
      font-family: var(--font-mono);
      flex-shrink: 0;
    }

    /* Line rows */
    .map-line-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .map-line-row__label {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      width: 28px;
      flex-shrink: 0;
      text-align: right;
    }

    .map-line-row__slots {
      display: flex;
      gap: 3px;
      flex: 1;
    }

    .map-slot {
      width: 32px;
      height: 28px;
      border: 1px solid;
      border-radius: 3px;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .map-slot:hover { opacity: 0.7; }

    /* Phase 3: active slot highlight */
    .map-slot--active {
      box-shadow: 0 0 0 2px var(--c-accent);
      background: rgba(240, 192, 64, 0.2) !important;
    }

    .map-grid-empty {
      font-size: 11px;
      color: var(--c-text-dim);
      font-family: var(--font-mono);
      padding: 16px 0;
    }

    /* Data status badge */
    .map-data-status {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      padding: 2px 8px;
      border-radius: 3px;
      align-self: flex-start;
      flex-shrink: 0;
    }

    .map-data-status--ready {
      background: #0d2a14;
      color: var(--c-green);
      border: 1px solid #1a4a24;
    }

    .map-data-status--pending {
      background: #2a1a00;
      color: var(--c-orange);
      border: 1px solid #4a3000;
    }

    /* ════════════════════════════════════════════════════════════════════════
       HAND PANEL (bottom-left)
    ════════════════════════════════════════════════════════════════════════ */
    #panel-hand {
      flex: 1;
      min-width: 0;
    }

    .hand-panel-inner {
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      height: 100%;
    }

    .hand-cards-row {
      display: flex;
      gap: 5px;
      flex: 1;
      align-items: center;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    /* Phase 2: empty slot */
    .hand-card-slot {
      flex-shrink: 0;
      width: 52px;
      height: 72px;
      border: 1px dashed var(--c-border);
      border-radius: 5px;
      background: var(--c-surface-2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hand-card-slot--empty .hand-card-slot__inner {
      width: 20px;
      height: 20px;
      border: 1px dashed var(--c-text-dim);
      border-radius: 3px;
      opacity: 0.4;
    }

    /* Phase 3: filled card slot */
    .hand-card-slot--filled {
      border-style: solid;
      border-color: var(--c-border);
      background: var(--c-surface-3);
      flex-direction: column;
      padding: 4px;
      cursor: default;
      align-items: flex-start;
      justify-content: flex-start;
    }

    .hand-card-slot--filled .hand-card-slot__inner {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      gap: 2px;
    }

    .hand-card__name {
      font-family: var(--font-mono);
      font-size: 8px;
      color: var(--c-text);
      line-height: 1.3;
      word-break: break-all;
      flex: 1;
    }

    .hand-card__meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .hand-card__rarity {
      font-family: var(--font-mono);
      font-size: 8px;
      font-weight: 700;
      padding: 1px 3px;
      border-radius: 2px;
    }

    .hand-card__score {
      font-family: var(--font-mono);
      font-size: 8px;
      color: var(--c-text-muted);
    }

    /* Rarity colors */
    .hand-card--legendary { border-color: #f0c040 !important; }
    .hand-card--legendary .hand-card__rarity { background: #3a2a00; color: #f0c040; }
    .hand-card--epic      { border-color: #bc8cff !important; }
    .hand-card--epic      .hand-card__rarity { background: #2a1a3a; color: #bc8cff; }
    .hand-card--rare      { border-color: #58a6ff !important; }
    .hand-card--rare      .hand-card__rarity { background: #0d2040; color: #58a6ff; }
    .hand-card--common    { border-color: var(--c-border) !important; }
    .hand-card--common    .hand-card__rarity { background: var(--c-surface-2); color: var(--c-text-muted); }

    .hand-empty-msg {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--c-text-dim);
      padding: 8px 4px;
    }

    /* Meta row */
    .hand-panel-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .hand-meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .hand-meta-label {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--c-text-dim);
      letter-spacing: 0.1em;
    }

    .hand-meta-value {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      color: var(--c-text-muted);
    }

    /* Phase 3: Turn controls */
    .hand-turn-controls {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .turn-btn {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 3px 10px;
      border-radius: 3px;
      border: 1px solid;
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
    }

    .turn-btn--play1 {
      background: #0d2a14;
      color: var(--c-green);
      border-color: var(--c-green);
    }

    .turn-btn--play1:hover {
      background: #1a4a24;
    }

    .turn-btn--auto {
      background: #1a1a2a;
      color: var(--c-city);
      border-color: var(--c-city);
    }

    .turn-btn--auto:hover {
      background: #1a3a5c;
    }

    .turn-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    /* ════════════════════════════════════════════════════════════════════════
       SCORE + LOG PANEL (bottom-right)
    ════════════════════════════════════════════════════════════════════════ */
    #panel-score {
      width: 240px;
      flex-shrink: 0;
    }

    .score-panel-inner {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    .score-section {
      border-bottom: 1px solid var(--c-border-soft);
      flex-shrink: 0;
    }

    .score-section--log {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      border-bottom: none;
    }

    .score-section__title {
      font-family: var(--font-mono);
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: var(--c-text-dim);
      padding: 4px 10px 2px;
    }

    /* Phase 3: current card */
    .score-current-card {
      padding: 4px 10px 6px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .score-current-card__name {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      color: var(--c-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .score-current-card__meta {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .score-card-rarity {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 700;
      padding: 1px 4px;
      border-radius: 2px;
    }

    .score-card-rarity--legendary { background: #3a2a00; color: #f0c040; }
    .score-card-rarity--epic      { background: #2a1a3a; color: #bc8cff; }
    .score-card-rarity--rare      { background: #0d2040; color: #58a6ff; }
    .score-card-rarity--common    { background: var(--c-surface-2); color: var(--c-text-muted); }

    .score-card-score {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--c-text-muted);
    }

    /* Phase 3: status rows */
    .score-status-rows {
      padding: 4px 10px 6px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .score-status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .score-status-label {
      font-size: 10px;
      color: var(--c-text-muted);
    }

    .score-status-value {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      color: var(--c-text);
    }

    .score-status-value--idle     { color: var(--c-text-dim); }
    .score-status-value--loading  { color: var(--c-orange); }
    .score-status-value--running  { color: var(--c-green); }
    .score-status-value--finished { color: var(--c-accent); }
    .score-status-value--error    { color: var(--c-red); }

    /* Score rows */
    .score-rows {
      padding: 4px 10px 6px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .score-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .score-row__label {
      font-size: 10px;
      color: var(--c-text-muted);
    }

    .score-row__value {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      color: var(--c-text);
    }

    .score-row--total .score-row__label {
      color: var(--c-accent);
      font-weight: 700;
    }

    .score-row--total .score-row__value {
      color: var(--c-accent);
      font-size: 14px;
    }

    /* Log */
    .score-log {
      flex: 1;
      overflow-y: auto;
      padding: 4px 10px 6px;
      display: flex;
      flex-direction: column;
      gap: 1px;
      min-height: 0;
    }

    .score-log__entry {
      font-family: var(--font-mono);
      font-size: 10px;
      line-height: 1.4;
      padding: 1px 0;
    }

    .score-log__entry--normal    { color: var(--c-text-muted); }
    .score-log__entry--highlight { color: var(--c-accent); }
    .score-log__entry--muted     { color: var(--c-text-dim); }
    .score-log__entry--warn      { color: var(--c-orange); }

    /* ════════════════════════════════════════════════════════════════════════
       BOOT ERROR
    ════════════════════════════════════════════════════════════════════════ */
    #boot-error {
      display: none;
      position: fixed;
      top: 54px;
      left: 50%;
      transform: translateX(-50%);
      background: #2d0f0f;
      color: var(--c-red);
      border: 1px solid var(--c-red);
      border-radius: 5px;
      padding: 10px 20px;
      font-family: var(--font-mono);
      font-size: 11px;
      z-index: 9999;
      max-width: 500px;
      text-align: center;
    }

    /* Notice banner */
    .gs-notice {
      position: fixed;
      top: 52px;
      left: 50%;
      transform: translateX(-50%);
      padding: 7px 18px;
      border-radius: 5px;
      font-size: 10px;
      font-family: var(--font-mono);
      z-index: 9998;
      pointer-events: none;
      white-space: nowrap;
    }

    .gs-notice--warn {
      background: #2a1a00;
      color: var(--c-orange);
      border: 1px solid #5a3a00;
    }

    /* ════════════════════════════════════════════════════════════════════════
       PHASE 4: MAP CANVAS (SVG)
    ════════════════════════════════════════════════════════════════════════ */

    /* Map panel body: remove old padding, let SVG fill */
    #map-panel-body {
      padding: 0 !important;
      gap: 0 !important;
    }

    /* Header row inside map panel */
    .map-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 12px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--c-border-soft);
      background: var(--c-surface-2);
    }

    .map-header__left {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-shrink: 0;
    }

    .map-city-label {
      font-family: var(--font-mono);
      font-size: 18px;
      font-weight: 700;
      color: var(--c-city);
      letter-spacing: 0.1em;
      line-height: 1;
    }

    .map-city-name {
      font-size: 11px;
      color: var(--c-text-muted);
    }

    .map-header__lines {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      flex: 1;
    }

    .map-header__right {
      flex-shrink: 0;
      margin-left: auto;
    }

    /* Game indicator in header */
    .map-game-indicator {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 2px 8px;
      border-radius: 3px;
      border: 1px solid var(--c-border);
      color: var(--c-text-dim);
      background: var(--c-surface-3);
    }

    .map-game-indicator--running  { color: var(--c-green);  border-color: var(--c-green);  background: #0d2a14; }
    .map-game-indicator--loading  { color: var(--c-orange); border-color: var(--c-orange); background: #2a1a00; }
    .map-game-indicator--finished { color: var(--c-accent); border-color: var(--c-accent); background: #2a1a00; }
    .map-game-indicator--error    { color: var(--c-red);    border-color: var(--c-red);    background: #2d0f0f; }

    /* SVG canvas wrapper */
    .map-canvas-wrap {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      position: relative;
      background: var(--c-bg);
    }

    .map-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Data status badge (bottom-left of map) */
    .map-data-status {
      position: absolute;
      bottom: 6px;
      left: 10px;
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      padding: 2px 8px;
      border-radius: 3px;
      pointer-events: none;
    }

    .map-data-status--ready   { background: #0d2a14; color: var(--c-green);  border: 1px solid #1a4a24; }
    .map-data-status--pending { background: #2a1a00; color: var(--c-orange); border: 1px solid #4a3000; }

    /* No-graph fallback */
    .map-no-graph {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--c-text-dim);
    }

    /* SVG node pulse animation */
    @keyframes map-pulse {
      0%   { r: 15; opacity: 0.6; }
      50%  { r: 22; opacity: 0.2; }
      100% { r: 15; opacity: 0.6; }
    }

    .map-node-pulse {
      animation: map-pulse 1.2s ease-in-out infinite;
    }

    /* SVG text labels */
    .map-node-label {
      pointer-events: none;
      font-family: var(--font-sans);
    }

    .map-legend-label {
      font-family: var(--font-mono);
    }

    /* ════════════════════════════════════════════════════════════════════════
       RESPONSIVE
    ════════════════════════════════════════════════════════════════════════ */
    /* ════════════════════════════════════════════════════════════════════════
       PHASE 5 — LIVE SCORE PANEL
    ════════════════════════════════════════════════════════════════════════ */

    /* Live score area placeholder */
    .score-placeholder {
      color: var(--c-text-dim);
      font-size: 11px;
      padding: 4px 0;
    }

    /* Per-player score block */
    .score-player-block {
      border: 1px solid var(--c-border);
      border-radius: 4px;
      padding: 6px 8px;
      margin-bottom: 6px;
      background: var(--c-surface-2);
    }

    .score-player-block--winner {
      border-color: var(--c-accent);
    }

    .score-player-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }

    .score-player-id {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 0.05em;
    }

    .score-player-id--p1 { color: #4fc3f7; }
    .score-player-id--p2 { color: #ef9a9a; }
    .score-player-id--pn { color: var(--c-text-muted); }

    .score-player-total {
      margin-left: auto;
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: bold;
      color: var(--c-text);
    }

    .score-breakdown-rows {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .score-breakdown-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 11px;
    }

    .score-breakdown-label {
      color: var(--c-text-muted);
    }

    .score-breakdown-value {
      font-family: var(--font-mono);
      color: var(--c-text);
    }

    .score-breakdown-value--bonus {
      color: var(--c-green);
    }

    .score-breakdown-value--route {
      color: var(--c-city);
      font-size: 10px;
      text-align: right;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .score-breakdown-row--route {
      margin-top: 2px;
      padding-top: 2px;
      border-top: 1px solid var(--c-border-soft);
    }

    /* ════════════════════════════════════════════════════════════════════════
       PHASE 5 — RESULT PANEL
    ════════════════════════════════════════════════════════════════════════ */

    .result-panel {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow-y: auto;
      padding: 8px;
      gap: 8px;
    }

    /* Header */
    .result-header {
      text-align: center;
      border-bottom: 1px solid var(--c-border);
      padding-bottom: 6px;
    }

    .result-header__title {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: bold;
      color: var(--c-accent);
      letter-spacing: 0.1em;
    }

    .result-header__sub {
      font-size: 11px;
      color: var(--c-text-muted);
      margin-top: 2px;
    }

    /* Winner announcement */
    .result-winner-announce {
      display: flex;
      align-items: baseline;
      gap: 8px;
      background: var(--c-surface-2);
      border: 1px solid var(--c-accent-dim);
      border-radius: 4px;
      padding: 8px 10px;
    }

    .result-winner-announce__label {
      font-size: 11px;
      color: var(--c-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .result-winner-announce__name {
      font-family: var(--font-mono);
      font-size: 16px;
      font-weight: bold;
    }

    .result-winner-announce__score {
      margin-left: auto;
      font-family: var(--font-mono);
      font-size: 14px;
      color: var(--c-accent);
    }

    /* Per-player result block */
    .result-player-block {
      border: 1px solid var(--c-border);
      border-radius: 4px;
      padding: 7px 9px;
      background: var(--c-surface-2);
    }

    .result-player-block--winner {
      border-color: var(--c-accent-dim);
      background: #1c1a0a;
    }

    .result-player-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 5px;
    }

    .result-rank {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--c-text-dim);
      width: 18px;
    }

    .result-player-id {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: bold;
    }

    .result-winner-badge {
      font-size: 9px;
      font-family: var(--font-mono);
      background: var(--c-accent);
      color: #000;
      padding: 1px 5px;
      border-radius: 2px;
      letter-spacing: 0.06em;
    }

    .result-total-score {
      margin-left: auto;
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: bold;
      color: var(--c-text);
    }

    .result-breakdown {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .result-breakdown-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 11px;
    }

    .result-breakdown-row--divider {
      margin-top: 3px;
      padding-top: 3px;
      border-top: 1px solid var(--c-border-soft);
    }

    .result-breakdown-label {
      color: var(--c-text-muted);
    }

    .result-breakdown-value {
      font-family: var(--font-mono);
      color: var(--c-text);
    }

    .result-breakdown-value--bonus {
      color: var(--c-green);
    }

    .result-breakdown-value--route {
      color: var(--c-city);
      font-size: 10px;
      text-align: right;
      max-width: 130px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .result-breakdown-value--hub {
      color: var(--c-purple);
      font-size: 10px;
    }

    .result-breakdown-value--station {
      color: var(--c-orange);
      font-size: 10px;
      text-align: right;
      max-width: 130px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .result-why-label {
      margin-top: 4px;
      font-size: 10px;
      color: var(--c-accent);
      font-style: italic;
    }

    /* Footer */
    .result-footer {
      text-align: center;
      font-size: 10px;
      color: var(--c-text-dim);
      padding: 4px 0;
      border-top: 1px solid var(--c-border-soft);
      margin-top: auto;
    }

    /* ════════════════════════════════════════════════════════════════════════
       PHASE 6: RUNTIME CLARITY & CROSS-CITY POLISH
    ════════════════════════════════════════════════════════════════════════ */

    /* Header game badge */
    .hdr-game-badge {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      padding: 2px 8px;
      border-radius: 3px;
      border: 1px solid var(--c-border);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .hdr-game-badge--idle     { color: var(--c-text-dim);  border-color: var(--c-border); }
    .hdr-game-badge--loading  { color: var(--c-orange);    border-color: var(--c-orange); background: rgba(210,153,34,0.08); }
    .hdr-game-badge--running  { color: var(--c-green);     border-color: var(--c-green);  background: rgba(63,185,80,0.08); }
    .hdr-game-badge--finished { color: var(--c-accent);    border-color: var(--c-accent); background: rgba(240,192,64,0.1); }
    .hdr-game-badge--error    { color: var(--c-red);       border-color: var(--c-red);    background: rgba(248,81,73,0.08); }

    /* Header turn counter */
    #hdr-turn-counter {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--c-text-muted);
      flex-shrink: 0;
    }

    /* City button with station count */
    .hdr-city-btn__label { display: block; }
    .hdr-city-btn__count {
      display: block;
      font-size: 8px;
      color: var(--c-text-dim);
      letter-spacing: 0;
      font-weight: 400;
      margin-top: 1px;
    }
    .hdr-city-btn--active .hdr-city-btn__count { color: var(--c-city); opacity: 0.7; }

    /* Map header (Phase 6 redesign) */
    .map-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 12px;
      background: var(--c-surface-2);
      border-bottom: 1px solid var(--c-border-soft);
      flex-shrink: 0;
    }

    .map-header__identity {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }

    .map-city-label {
      font-family: var(--font-mono);
      font-size: 16px;
      font-weight: 700;
      color: var(--c-city);
      letter-spacing: 0.1em;
      flex-shrink: 0;
    }

    .map-city-name {
      font-size: 11px;
      color: var(--c-text-muted);
      flex-shrink: 0;
    }

    .map-city-descriptor {
      font-size: 10px;
      color: var(--c-text-dim);
      font-style: italic;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .map-city-summary {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--c-text-dim);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .map-header__lines {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .map-header__right {
      flex-shrink: 0;
    }

    /* Map game indicator (Phase 6 — inline text, not icon) */
    .map-game-indicator {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      color: var(--c-text-dim);
      padding: 2px 6px;
      border: 1px solid var(--c-border);
      border-radius: 3px;
      white-space: nowrap;
    }

    .map-game-indicator--running  { color: var(--c-green);  border-color: var(--c-green);  background: rgba(63,185,80,0.06); }
    .map-game-indicator--loading  { color: var(--c-orange); border-color: var(--c-orange); }
    .map-game-indicator--finished { color: var(--c-accent); border-color: var(--c-accent); background: rgba(240,192,64,0.08); }
    .map-game-indicator--error    { color: var(--c-red);    border-color: var(--c-red); }

    /* Map canvas wrap */
    .map-canvas-wrap {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      display: flex;
      align-items: stretch;
    }

    .map-svg {
      width: 100%;
      height: 100%;
    }

    .map-data-status {
      font-family: var(--font-mono);
      font-size: 8px;
      letter-spacing: 0.1em;
      padding: 2px 8px;
      flex-shrink: 0;
    }

    .map-data-status--ready   { color: var(--c-green); }
    .map-data-status--pending { color: var(--c-text-dim); }

    .map-no-graph {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--c-text-dim);
      font-size: 11px;
      width: 100%;
      height: 100%;
    }

    /* Score panel Phase 6: compact status inline */
    .score-status-inline {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 8px;
    }

    .score-status-chip {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid var(--c-border);
      color: var(--c-text-dim);
    }

    .score-status-chip--idle     { color: var(--c-text-dim); border-color: var(--c-border); }
    .score-status-chip--loading  { color: var(--c-orange);   border-color: var(--c-orange); }
    .score-status-chip--running  { color: var(--c-green);    border-color: var(--c-green);  background: rgba(63,185,80,0.08); }
    .score-status-chip--finished { color: var(--c-accent);   border-color: var(--c-accent); }
    .score-status-chip--error    { color: var(--c-red);      border-color: var(--c-red); }

    .score-status-item {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 11px;
    }

    .score-status-item .score-status-label {
      color: var(--c-text-dim);
      font-size: 9px;
    }

    /* Score player block Phase 6: lead indicator */
    .score-player-block--lead {
      border-left: 2px solid var(--c-accent) !important;
      background: rgba(240,192,64,0.04);
    }

    .score-lead-badge {
      font-family: var(--font-mono);
      font-size: 8px;
      font-weight: 700;
      color: var(--c-accent);
      letter-spacing: 0.08em;
      flex: 1;
    }

    /* Score bar visualization */
    .score-breakdown-compact {
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding: 0 6px 6px;
    }

    .score-breakdown-bar-row {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
    }

    .score-bar-wrap {
      flex: 1;
      height: 4px;
      background: var(--c-surface-3);
      border-radius: 2px;
      overflow: hidden;
    }

    .score-bar {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .score-bar--station { background: var(--c-city); }

    /* Result panel Phase 6: winner prominence */
    .result-winner-announce {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 8px 12px;
      background: rgba(240,192,64,0.06);
      border-bottom: 1px solid var(--c-border-soft);
    }

    .result-winner-announce__label {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: var(--c-text-muted);
    }

    .result-winner-announce__name {
      font-family: var(--font-mono);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.1em;
      line-height: 1;
    }

    .result-winner-announce__score {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 700;
    }

    .result-winner-announce__draw {
      font-family: var(--font-mono);
      font-size: 20px;
      font-weight: 700;
      color: var(--c-text-muted);
      letter-spacing: 0.14em;
    }

    /* Result breakdown grid (Phase 6: 2-column) */
    .result-breakdown-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 2px 8px;
      font-size: 11px;
      padding: 4px 0;
    }

    .result-breakdown-grid .result-breakdown-label {
      color: var(--c-text-muted);
      white-space: nowrap;
    }

    .result-breakdown-grid .result-breakdown-value {
      font-family: var(--font-mono);
      text-align: right;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    @media (max-width: 680px) {
      #bottom-area {
        flex-direction: column;
        height: auto;
      }

      #panel-score {
        width: 100%;
      }

      .map-city-identity__label {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>

<div id="app">

  <!-- ════════════════════════════════════════════════════════════════════════
       HEADER BAR
  ════════════════════════════════════════════════════════════════════════ -->
  <header id="app-header">

    <!-- Brand + City -->
    <div class="hdr-brand">
      <span class="hdr-brand__platform">GUNOS V1</span>
      <span class="hdr-brand__sep">·</span>
      <span class="hdr-brand__city" id="hdr-city-label">——</span>
    </div>

    <!-- City Selector -->
    <div id="hdr-city-selector">
      <!-- Populated by header_bar.js -->
    </div>

    <div class="hdr-spacer"></div>

    <!-- Game state badge + turn counter (Phase 6) -->
    <span class="hdr-game-badge hdr-game-badge--idle" id="hdr-game-badge">IDLE</span>
    <span id="hdr-turn-counter" style="display:none"></span>

    <!-- Turn controls (injected by main.js — Phase 6: moved to header) -->

    <!-- Action Buttons -->
    <div class="hdr-actions">
      <span class="hdr-status hdr-status--loading" id="hdr-status">Booting...</span>
      <button class="hdr-action-btn hdr-action-btn--reset" id="btn-reset">RESET</button>
      <button class="hdr-action-btn hdr-action-btn--start hdr-action-btn--ready" id="btn-start">START</button>
    </div>

  </header>

  <!-- ════════════════════════════════════════════════════════════════════════
       MAIN BODY
  ════════════════════════════════════════════════════════════════════════ -->
  <div id="app-body">

    <!-- ── Map Area (dominant center) ──────────────────────────────────────── -->
    <div id="map-area">
      <section class="gs-panel" id="panel-map" style="height:100%;">
        <div class="gs-panel__header">
          <span class="gs-panel__title">MAP</span>
          <span class="gs-panel__title gs-panel__title--city" id="hdr-city-name">——</span>
        </div>
        <div class="gs-panel__body" id="map-panel-body">
          <!-- Populated by map_panel.js -->
        </div>
      </section>
    </div>

    <!-- ── Bottom Split Panels ─────────────────────────────────────────────── -->
    <div id="bottom-area">

      <!-- Hand Panel (bottom-left) -->
      <section class="gs-panel" id="panel-hand">
        <div class="gs-panel__header">
          <span class="gs-panel__title">HAND</span>
          <!-- Phase 6: turn controls now in header -->
          <div id="hdr-turn-controls" style="display:flex;gap:4px;align-items:center;"></div>
        </div>
        <div class="gs-panel__body" id="hand-panel-body">
          <!-- Populated by hand_panel.js -->
        </div>
      </section>

      <!-- Score + Log Panel (bottom-right) -->
      <section class="gs-panel" id="panel-score">
        <div class="gs-panel__header">
          <span class="gs-panel__title">STATUS</span>
          <span class="gs-panel__title" id="panel-score-phase" style="color:var(--c-text-dim);">IDLE</span>
        </div>
        <div class="gs-panel__body" id="score-panel-body">
          <!-- Populated by score_panel.js -->
        </div>
      </section>

    </div>

  </div>

</div>

<!-- Boot error banner -->
<div id="boot-error"></div>

<!-- App entry point -->
<script type="module" src="src/app/main.js?v=7"></script>

</body>
</html>
