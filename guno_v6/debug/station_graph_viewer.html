<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GUNO V6 — Station Graph Viewer</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      font-size: 12px;
      background: #111827;
      color: #d1d5db;
    }

    /* ── Layout ─────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: #1f2937;
      border-bottom: 1px solid #374151;
      flex-shrink: 0;
    }

    #toolbar h1 {
      font-size: 13px;
      font-weight: 700;
      color: #f9fafb;
      letter-spacing: 0.04em;
    }

    .badge {
      background: #374151;
      color: #9ca3af;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    #toolbar-status {
      margin-left: auto;
      font-size: 11px;
      color: #6b7280;
    }
    #toolbar-status.ok  { color: #34d399; }
    #toolbar-status.err { color: #f87171; }

    /* ── City selector ───────────────────────── */
    #city-selector-wrapper {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-left: 8px;
    }
    #city-selector-wrapper label {
      font-size: 10px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }
    #city-select {
      background: #374151;
      color: #d1d5db;
      border: 1px solid #4b5563;
      border-radius: 4px;
      font-size: 11px;
      padding: 3px 6px;
      cursor: pointer;
      outline: none;
    }

    /* ── Map controls ────────────────────────── */
    .ctrl-btn {
      padding: 4px 10px;
      font-size: 11px;
      background: #374151;
      color: #d1d5db;
      border: 1px solid #4b5563;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .ctrl-btn:hover { background: #4b5563; }
    .ctrl-btn.active { background: #2563eb; border-color: #3b82f6; color: #fff; }

    /* ── Body split ──────────────────────────── */
    #body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    #map {
      flex: 1;
      height: 100%;
    }

    /* ── Sidebar ─────────────────────────────── */
    #sidebar {
      width: 220px;
      flex-shrink: 0;
      background: #1f2937;
      border-left: 1px solid #374151;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .section {
      padding: 10px 12px;
      border-bottom: 1px solid #374151;
    }

    .section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6b7280;
      margin-bottom: 8px;
    }

    /* Statistics */
    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
    }
    .stat-label { color: #9ca3af; font-size: 11px; }
    .stat-value { font-size: 13px; font-weight: 700; color: #f9fafb; }

    /* Inspector */
    #inspector-content {
      font-size: 11px;
      color: #9ca3af;
      line-height: 1.7;
    }
    #inspector-content .field-name  { color: #6b7280; }
    #inspector-content .field-value { color: #f9fafb; font-weight: 600; }
    #inspector-content .hub-badge {
      display: inline-block;
      background: #7c3aed;
      color: #fff;
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 3px;
      margin-left: 4px;
    }

    /* Line legend */
    .line-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 0;
    }
    .line-swatch {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .line-name  { font-size: 11px; color: #d1d5db; }
    .line-edges { margin-left: auto; font-size: 10px; color: #6b7280; }

    /* Loading overlay */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(17,24,39,0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      gap: 14px;
    }
    #overlay.hidden { display: none; }
    #overlay p { color: #9ca3af; font-size: 13px; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #374151;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error banner */
    #error-banner {
      display: none;
      position: fixed;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: #7f1d1d;
      color: #fca5a5;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 12px;
      z-index: 9998;
    }

    /* Data-not-ready banner */
    #data-not-ready-banner {
      display: none;
      position: fixed;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: #78350f;
      color: #fde68a;
      padding: 10px 24px;
      border-radius: 6px;
      font-size: 12px;
      z-index: 9997;
      text-align: center;
      border: 1px solid #d97706;
    }
  </style>
</head>
<body>

<div id="overlay">
  <div class="spinner"></div>
  <p id="overlay-msg">Loading station graph…</p>
</div>

<div id="error-banner">Failed to load station graph</div>
<div id="data-not-ready-banner"></div>

<div id="app">

  <!-- Toolbar -->
  <div id="toolbar">
    <h1 id="toolbar-title">GUNO V6 — Station Graph Viewer</h1>
    <span class="badge">debug</span>
    <button class="ctrl-btn" id="btn-fit">Fit to Graph</button>
    <button class="ctrl-btn active" id="btn-edges">Toggle Edges</button>
    <button class="ctrl-btn" id="btn-labels">Toggle Labels</button>

    <!-- City selector (populated dynamically) -->
    <div id="city-selector-wrapper">
      <label for="city-select">City:</label>
      <select id="city-select"></select>
    </div>

    <span id="toolbar-status">Initializing…</span>
  </div>

  <!-- Body -->
  <div id="body">
    <div id="map"></div>

    <div id="sidebar">

      <!-- Statistics -->
      <div class="section">
        <div class="section-title">Graph Statistics</div>
        <div class="stat-row">
          <span class="stat-label">Total nodes</span>
          <span class="stat-value" id="s-nodes">—</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Total edges</span>
          <span class="stat-value" id="s-edges">—</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Total lines</span>
          <span class="stat-value" id="s-lines">—</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Hub nodes</span>
          <span class="stat-value" id="s-hubs">—</span>
        </div>
      </div>

      <!-- Station Inspector -->
      <div class="section">
        <div class="section-title">Station Inspector</div>
        <div id="inspector-content">
          <span style="color:#6b7280;font-size:11px">Click a station to inspect</span>
        </div>
      </div>

      <!-- Line Legend -->
      <div class="section">
        <div class="section-title">Lines</div>
        <div id="line-legend"></div>
      </div>

    </div>
  </div>
</div>

<script type="module">
import {
  loadCityRegistry,
  getDefaultCityId,
  loadCityProfile,
  listAvailableCities,
  resolveDatasetUrl,
} from '../src/city/city_loader.js';

// ── City resolution ───────────────────────────────────────────────────────────

function getCityIdFromUrl() {
  return new URLSearchParams(window.location.search).get('city') || null;
}

async function resolveCity() {
  const registry  = await loadCityRegistry();
  const defaultId = getDefaultCityId(registry);
  const paramId   = getCityIdFromUrl();

  if (!paramId) return { cityId: defaultId, registry };

  const valid = registry.cities.some(c => c.city_id === paramId);
  if (!valid) {
    showBanner('error-banner', `Unknown city "${paramId}" — falling back to "${defaultId}"`);
    return { cityId: defaultId, registry };
  }
  return { cityId: paramId, registry };
}

// ── City selector ─────────────────────────────────────────────────────────────

function populateCitySelector(cities, activeCityId) {
  const select = document.getElementById('city-select');
  select.innerHTML = '';
  cities.forEach(city => {
    const opt = document.createElement('option');
    opt.value = city.city_id;
    opt.textContent = city.display_name || city.city_id;
    if (city.city_id === activeCityId) opt.selected = true;
    select.appendChild(opt);
  });
  select.addEventListener('change', () => {
    const url = new URL(window.location.href);
    url.searchParams.set('city', select.value);
    window.location.href = url.toString();
  });
}

// ── Banner helpers ────────────────────────────────────────────────────────────

function showBanner(id, msg) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg;
  el.style.display = 'block';
}

// ── Map ───────────────────────────────────────────────────────────────────────

const DEFAULT_COLOR = '#94a3b8';

let map;
let graph;
let lineColors = {};
let nodeIndex = new Map();
let nodeMarkers = [];
let edgePolylines = [];
let labelMarkers = [];
let edgeBounds;
let edgesVisible = true;
let labelsVisible = false;

function initMap(center) {
  map = L.map('map', { center: center || [35.6895, 139.6917], zoom: 11 });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap contributors © CARTO',
    maxZoom: 19,
  }).addTo(map);
}

function renderNodes() {
  graph.nodes.forEach(n => nodeIndex.set(n.node_id, n));
  graph.nodes.forEach(n => {
    const isHub = n.hub_degree_global > 1;
    const radius = isHub ? 10 : 7;
    const color  = isHub ? '#e879f9' : '#f1f5f9';
    const marker = L.circleMarker([n.lat, n.lon], {
      radius, fillColor: color, color: '#111827',
      weight: isHub ? 2 : 1, fillOpacity: 0.95, bubblingMouseEvents: false,
    }).addTo(map);
    marker.on('click', (e) => { L.DomEvent.stopPropagation(e); inspectStation(n); });
    nodeMarkers.push({ marker, node: n });
    const icon = L.divIcon({
      className: '',
      html: `<div style="background:rgba(31,41,55,0.88);color:#f9fafb;font-size:10px;padding:1px 5px;border-radius:3px;white-space:nowrap;border:1px solid #374151;pointer-events:none">${n.station_name}</div>`,
      iconAnchor: [-10, 10],
    });
    const lm = L.marker([n.lat, n.lon], { icon, interactive: false, zIndexOffset: -100 });
    labelMarkers.push(lm);
  });
}

function renderEdges() {
  const latlngs = [];
  graph.edges.forEach(e => {
    const fromNode = nodeIndex.get(e.from);
    const toNode   = nodeIndex.get(e.to);
    if (!fromNode || !toNode) return;
    const color = lineColors[e.line_id] || DEFAULT_COLOR;
    const pl = L.polyline(
      [[fromNode.lat, fromNode.lon], [toNode.lat, toNode.lon]],
      { color, weight: 2.5, opacity: 0.8, interactive: false }
    ).addTo(map);
    edgePolylines.push(pl);
    latlngs.push([fromNode.lat, fromNode.lon], [toNode.lat, toNode.lon]);
  });
  if (latlngs.length) edgeBounds = L.latLngBounds(latlngs);
}

function renderStats() {
  const stats = graph.graph_statistics || {};
  document.getElementById('s-nodes').textContent = stats.node_count ?? graph.nodes.length;
  document.getElementById('s-edges').textContent = stats.edge_count ?? graph.edges.length;
  document.getElementById('s-lines').textContent = stats.line_count ?? '—';
  document.getElementById('s-hubs').textContent  = stats.transfer_station_count ?? graph.nodes.filter(n => n.hub_degree_global > 1).length;
}

function renderLegend(linesData) {
  const container = document.getElementById('line-legend');
  container.innerHTML = '';
  linesData.forEach(line => {
    const div = document.createElement('div');
    div.className = 'line-item';
    div.innerHTML = `
      <div class="line-swatch" style="background:${line.color || DEFAULT_COLOR}"></div>
      <span class="line-name">${line.line_name || line.line_id}</span>
      <span class="line-edges">${line.line_id}</span>
    `;
    container.appendChild(div);
  });
}

function inspectStation(n) {
  const hubBadge = n.hub_degree_global > 1
    ? `<span class="hub-badge">HUB ×${n.hub_degree_global}</span>` : '';
  document.getElementById('inspector-content').innerHTML = `
    <div><span class="field-name">name: </span><span class="field-value">${n.station_name}</span>${hubBadge}</div>
    <div><span class="field-name">slug: </span><span class="field-value">${n.station_slug}</span></div>
    <div><span class="field-name">node_id: </span><span class="field-value" style="font-size:10px">${n.node_id}</span></div>
    <div><span class="field-name">lat: </span><span class="field-value">${n.lat}</span></div>
    <div><span class="field-name">lon: </span><span class="field-value">${n.lon}</span></div>
    <div><span class="field-name">line_count: </span><span class="field-value">${n.line_count}</span></div>
    <div><span class="field-name">hub_degree: </span><span class="field-value">${n.hub_degree_global}</span></div>
  `;
}

function setStatus(msg, type) {
  const el = document.getElementById('toolbar-status');
  el.textContent = msg;
  el.className = type || '';
}

// ── Toolbar buttons ───────────────────────────────────────────────────────────

document.getElementById('btn-fit').addEventListener('click', () => {
  if (edgeBounds) map.fitBounds(edgeBounds, { padding: [40, 40] });
});
document.getElementById('btn-edges').addEventListener('click', function () {
  edgesVisible = !edgesVisible;
  this.classList.toggle('active', edgesVisible);
  edgePolylines.forEach(pl => { if (edgesVisible) pl.addTo(map); else map.removeLayer(pl); });
});
document.getElementById('btn-labels').addEventListener('click', function () {
  labelsVisible = !labelsVisible;
  this.classList.toggle('active', labelsVisible);
  labelMarkers.forEach(lm => { if (labelsVisible) lm.addTo(map); else map.removeLayer(lm); });
});

// ── Bootstrap ─────────────────────────────────────────────────────────────────

(async () => {
  try {
    // 1. Resolve city
    const { cityId, registry } = await resolveCity();
    const cities = registry.cities;
    populateCitySelector(cities, cityId);

    // 2. Load city profile
    const profile = await loadCityProfile(cityId);
    const cityName = profile.name || profile.city_id;
    document.getElementById('toolbar-title').textContent = `GUNO V6 — Station Graph Viewer [${cityName}]`;
    document.title = `Station Graph — ${cityName}`;

    // 3. Check data_ready
    if (profile.status?.data_ready === false) {
      document.getElementById('overlay').classList.add('hidden');
      const banner = document.getElementById('data-not-ready-banner');
      banner.innerHTML = `<strong>${cityName}</strong> — dataset not ready yet <span style="color:#a16207;margin-left:8px">(city_id: ${cityId})</span>`;
      banner.style.display = 'block';
      setStatus('Data not ready', 'err');
      return;
    }

    // 4. Load graph
    document.getElementById('overlay-msg').textContent = `Loading ${cityName} graph…`;
    const graphUrl = resolveDatasetUrl('station_graph', profile);
    const res = await fetch(graphUrl);
    if (!res.ok) throw new Error(`HTTP ${res.status} — ${graphUrl}`);
    graph = await res.json();

    // 5. Load lines for legend colors
    const linesUrl = resolveDatasetUrl('lines_master', profile);
    let linesData = [];
    try {
      const lr = await fetch(linesUrl);
      if (lr.ok) {
        linesData = await lr.json();
        linesData.forEach(l => { lineColors[l.line_id] = l.color; });
      }
    } catch (_) { /* non-fatal */ }

    // 6. Determine map center from graph
    const firstNode = graph.nodes[0];
    const center = firstNode ? [firstNode.lat, firstNode.lon] : [35.6895, 139.6917];
    initMap(center);

    // 7. Render
    renderStats();
    renderNodes();
    renderEdges();
    renderLegend(linesData);

    if (edgeBounds) map.fitBounds(edgeBounds, { padding: [40, 40] });
    setStatus(`Loaded — ${graph.nodes.length} nodes, ${graph.edges.length} edges`, 'ok');

  } catch (err) {
    console.error('[Viewer] Error:', err);
    setStatus('Failed to load station graph', 'err');
    showBanner('error-banner', `Failed to load station graph: ${err.message}`);
  } finally {
    document.getElementById('overlay').classList.add('hidden');
  }
})();
</script>
</body>
</html>
