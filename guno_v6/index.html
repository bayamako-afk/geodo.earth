<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GUNO V6</title>
  <style>
    /* ─── Reset & Base ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #121212;
      --surface: #1e1e1e;
      --surface2: #2a2a2a;
      --border: #333;
      --text: #e0e0e0;
      --text-dim: #888;
      --accent: #4caf50;
      --card-w: 52px;
      --card-h: 76px;
      --radius: 6px;
    }
    body { background: var(--bg); color: var(--text); font-family: sans-serif; font-size: 13px; }

    /* ─── Layout ─── */
    #app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    #toolbar { display: flex; align-items: center; gap: 6px; padding: 6px 10px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    #toolbar h1 { font-size: 16px; color: var(--accent); margin-right: 8px; }
    #toolbar select, #toolbar button { font-size: 12px; padding: 3px 8px; background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; }
    #hint-area { margin-left: auto; font-size: 12px; color: var(--text-dim); }

    #main { display: flex; flex: 1; overflow: hidden; }

    /* ─── Left: Board ─── */
    #board-panel { width: 220px; flex-shrink: 0; display: flex; flex-direction: column; gap: 6px; padding: 8px; overflow-y: auto; border-right: 1px solid var(--border); }
    .board-row { display: flex; align-items: center; gap: 8px; }
    #deck-btn { cursor: pointer; background: var(--surface2); border: 2px solid var(--border); border-radius: var(--radius); width: 52px; height: 76px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: var(--text-dim); }
    #deck-btn.deck-count--drawable { border-color: var(--accent); color: var(--accent); }
    #deck-count { font-size: 20px; font-weight: bold; }
    #direction-arrow { font-size: 20px; }

    /* ─── Route Slots ─── */
    .route-section { background: var(--surface); border-radius: var(--radius); overflow: hidden; }
    .route-header { padding: 3px 6px; font-size: 11px; font-weight: bold; color: #fff; }
    .route-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; padding: 4px; }
    .slot { background: var(--surface2); border: 1px solid var(--border); border-radius: 3px; padding: 2px; min-height: 36px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; font-size: 9px; text-align: center; }
    .slot--owned { border-width: 2px; }
    .slot__order { font-size: 8px; color: var(--text-dim); }
    .slot__name { font-size: 9px; line-height: 1.2; word-break: break-all; }
    .slot__owner { position: absolute; bottom: 1px; right: 1px; width: 14px; height: 14px; border-radius: 50%; border: 1px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 8px; }
    .star { color: gold; }

    /* ─── Center: Players ─── */
    #players-panel { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
    .player-panel { background: var(--surface); border-left: 4px solid var(--border); border-radius: var(--radius); padding: 6px 8px; }
    .player-panel--active { background: #1a2a1a; }
    .player-panel--eliminated { opacity: 0.4; }
    .player-panel__header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; font-size: 12px; }
    .player-panel__stats { font-size: 10px; color: var(--text-dim); margin-left: auto; }
    .player-panel__hand { display: flex; flex-wrap: wrap; gap: 3px; }

    /* ─── Cards ─── */
    .card { width: var(--card-w); height: var(--card-h); border-radius: var(--radius); border: 2px solid transparent; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; font-size: 9px; cursor: default; user-select: none; overflow: hidden; }
    .card--back { background: #1a3a5c; border-color: #2a5a8c; color: var(--text-dim); font-size: 24px; }
    .card--station { background: var(--surface2); }
    .card--teiden { background: #1a1a1a; border-color: #444; }
    .card--playable { border-color: var(--accent) !important; cursor: pointer; box-shadow: 0 0 8px rgba(76,175,80,0.5); }
    .card--unplayable { opacity: 0.5; }
    .card[data-line="JY"] { border-color: #9acd32; }
    .card[data-line="M"]  { border-color: #e60012; }
    .card[data-line="G"]  { border-color: #f39700; }
    .card[data-line="T"]  { border-color: #009bbf; }
    .card__corner { position: absolute; font-size: 10px; font-weight: bold; line-height: 1; }
    .card__corner--tl { top: 3px; left: 4px; }
    .card__corner--br { bottom: 3px; right: 4px; transform: rotate(180deg); }
    .card__center { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 4px; }
    .card__name-ja { font-size: 11px; font-weight: bold; line-height: 1.2; }
    .card__name-en { font-size: 8px; color: var(--text-dim); line-height: 1.2; }
    .card__route-code { position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%); font-size: 8px; font-weight: bold; opacity: 0.7; }
    .card__teiden-icon { font-size: 22px; }
    .card__teiden-label { font-size: 10px; font-weight: bold; }
    .card__teiden-en { font-size: 8px; color: var(--text-dim); }
    .card--empty { background: var(--surface2); border-color: var(--border); color: var(--text-dim); font-size: 18px; }

    /* ─── Right: Log ─── */
    #log-panel { width: 200px; flex-shrink: 0; display: flex; flex-direction: column; border-left: 1px solid var(--border); }
    #log-panel h2 { padding: 6px 8px; font-size: 12px; background: var(--surface); border-bottom: 1px solid var(--border); }
    #game-log { flex: 1; overflow-y: auto; padding: 6px 8px; font-size: 11px; line-height: 1.6; }
    .log-entry { border-bottom: 1px solid var(--border); padding: 2px 0; }

    /* ─── Result Overlay ─── */
    #result-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
    .result-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; min-width: 400px; text-align: center; }
    .result-box h2 { font-size: 20px; color: var(--accent); margin-bottom: 16px; }
    #result-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 12px; }
    #result-table th, #result-table td { padding: 4px 8px; border: 1px solid var(--border); }
    #result-table thead { background: var(--surface2); }
    .result-box button { padding: 8px 24px; background: var(--accent); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
  </style>
</head>
<body>
  <div id="app">
    <!-- Toolbar -->
    <div id="toolbar">
      <h1>GUNO V6</h1>
      <label>Players:
        <select id="player-count">
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4" selected>4</option>
        </select>
      </label>
      <button onclick="startGame()">🆕 New Game</button>
      <button id="btn-mode" onclick="toggleAuto()">▶️ AUTO: OFF</button>
      <button onclick="toggleLog()">📜 Log</button>
      <span id="hint-area"></span>
    </div>

    <!-- Main -->
    <div id="main">
      <!-- Board panel -->
      <div id="board-panel">
        <div class="board-row">
          <div id="deck-btn" onclick="humanDraw()">
            <span>DECK</span>
            <span id="deck-count">--</span>
          </div>
          <div id="discard-pile"></div>
          <span id="direction-arrow">↻</span>
        </div>

        <!-- Route slots -->
        <div class="route-section">
          <div class="route-header" id="header-jy">[JY] 山手線</div>
          <div class="route-grid" id="slots-jy"></div>
        </div>
        <div class="route-section">
          <div class="route-header" id="header-m">[M] 丸ノ内線</div>
          <div class="route-grid" id="slots-m"></div>
        </div>
        <div class="route-section">
          <div class="route-header" id="header-g">[G] 銀座線</div>
          <div class="route-grid" id="slots-g"></div>
        </div>
        <div class="route-section">
          <div class="route-header" id="header-t">[T] 東西線</div>
          <div class="route-grid" id="slots-t"></div>
        </div>
      </div>

      <!-- Players panel -->
      <div id="players-panel">
        <div id="players-area"></div>
      </div>

      <!-- Log panel -->
      <div id="log-panel">
        <h2>📜 ログ</h2>
        <div id="game-log"></div>
      </div>
    </div>
  </div>

  <!-- Result overlay -->
  <div id="result-overlay">
    <div class="result-box">
      <h2>🏁 ゲーム終了！</h2>
      <table id="result-table"></table>
      <button onclick="startGame(); document.getElementById('result-overlay').style.display='none';">
        🆕 もう一度
      </button>
    </div>
  </div>

  <script type="module" src="./src/app/main.js"></script>
</body>
</html>
